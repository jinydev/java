<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">극장 요금 계산 알고리즘 (age = 25)</text>

    <g transform="translate(100, 70)">
        
        <!-- 1st Check (< 13) -->
        <g transform="translate(0, 0)">
            <polygon points="100,0 200,20 100,40 0,20" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="100" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">age &lt; 13</text>
            
            <text x="210" y="15" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True</text>
            <rect x="250" y="0" width="220" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
            <text x="360" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold" text-anchor="middle">어린이 요금</text>

            <text x="110" y="70" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False (아래로 통과)</text>
        </g>
        <path d="M 100 40 L 100 100" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 2nd Check (< 19) -->
        <g transform="translate(0, 100)">
            <polygon points="100,0 200,20 100,40 0,20" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="100" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">age &lt; 19</text>
            
            <text x="210" y="15" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True</text>
            <rect x="250" y="0" width="220" height="40" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
            <text x="360" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#1d4ed8" font-weight="bold" text-anchor="middle">청소년 요금</text>

             <text x="110" y="70" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False (아래로 통과)</text>
        </g>
        <path d="M 100 140 L 100 200" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 3rd Case (else) -->
        <g transform="translate(50, 200)">
            <rect width="100" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="3" />
            <text x="50" y="25" font-family="monospace" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">else</text>
            
            <text x="160" y="15" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">나머지 모두</text>
            <rect x="200" y="0" width="220" height="40" rx="5" fill="#f3e8ff" stroke="#9333ea" stroke-width="2" />
            <text x="310" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#7e22ce" font-weight="bold" text-anchor="middle">성인 요금 출력!</text>
        </g>
        
        <!-- Tracing Data Animation (age = 25) -->
        <circle cx="100" cy="-30" r="12" fill="#ef4444">
            <!-- Drops through false, false, goes to else -->
            <animateMotion dur="5s" repeatCount="indefinite" path="M 0 10 L 0 50 L 0 120 L 0 150 L 0 220 L 30 220 L 150 220" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.7; 1" />
        </circle>
        <text x="100" y="-35" font-family="monospace" font-size="14" fill="#ffffff" font-weight="bold">
            <animateMotion dur="5s" repeatCount="indefinite" path="M 0 10 L 0 50 L 0 120 L 0 150 L 0 220 L 30 220 L 150 220" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.7; 1" />
            <tspan dx="-8" dy="-6">25</tspan>
        </text>

    </g>

    <text x="400" y="380" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#9f1239" font-weight="bold" text-anchor="middle">👇 25살은 &lt;13 검문소에서 불합격, &lt;19 검문소에서도 불합격하여 결국 else 로 가게 됩니다!</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
        </marker>
    </defs>
</svg>
