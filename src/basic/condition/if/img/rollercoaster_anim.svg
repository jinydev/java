<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">롤러코스터 탑승 알고리즘 (height = 145)</text>

    <!-- Pipeline Structure -->
    <g transform="translate(150, 80)">
        
        <!-- Condition Check -->
        <g transform="translate(100, 0)">
            <polygon points="100,0 200,20 100,40 0,20" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="100" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">height >= 150</text>
            
            <!-- True Path (Up) -->
            <path d="M 200 20 L 250 20 L 250 -30 L 300 -30" fill="none" stroke="#16a34a" stroke-width="3" stroke-dasharray="4,4" />
            <text x="230" y="10" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True</text>
            
            <rect x="300" y="-50" width="180" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
            <text x="390" y="-25" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold" text-anchor="middle">"탑승 가능합니다!"</text>

            <!-- False Path (Down) -->
            <path d="M 200 20 L 250 20 L 250 70 L 300 70" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="4,4" />
            <text x="230" y="45" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False</text>
            
            <rect x="300" y="50" width="180" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
            <text x="390" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" font-weight="bold" text-anchor="middle">"탑승할 수 없습니다"</text>
        </g>

        <!-- Initializing Arrow -->
        <path d="M 0 20 L 100 20" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- Tracing Data Animation (height = 145) -->
        <circle cx="0" cy="20" r="15" fill="#3b82f6">
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 0 L 100 0 L 150 0 L 150 50 L 200 50 L 350 50" keyTimes="0; 0.2; 0.35; 0.45; 0.5; 1" />
            <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.51;0.99;1" dur="4s" repeatCount="indefinite" />
        </circle>
        
        <text x="0" y="25" font-family="monospace" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 0 L 100 0 L 150 0 L 150 50 L 200 50 L 350 50" keyTimes="0; 0.2; 0.35; 0.45; 0.5; 1" />
            145
        </text>
    </g>
    
    <text x="400" y="250" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">👇 145는 150보다 크거나 같지 않으므로 예측대로 False 방향으로 흐릅니다!</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
        </marker>
    </defs>
</svg>
