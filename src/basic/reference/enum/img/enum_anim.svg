<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes highlight-link {
      0%, 100% { stroke: transparent; }
      50% { stroke: #0dcaf0; stroke-width: 4; stroke-dasharray: 8; }
    }
    @keyframes pulse-obj {
      0%, 100% { fill: #f8f9fa; }
      50% { fill: #d1e7dd; }
    }
    .anim-link { animation: highlight-link 3s infinite; }
    .anim-obj { animation: pulse-obj 3s infinite; }
    .box-title { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #495057; }
    .code-text { font-family: monospace; font-size: 14px; font-weight: bold; fill: #20c997; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">열거(Enum) 타입의 메모리 구조 (싱글톤 로직)</text>

  <!-- 자바 코드 -->
  <g transform="translate(60, 60)">
    <rect width="280" height="80" rx="5" fill="#212529" stroke="none"/>
    <text x="20" y="30" class="code-text"><tspan fill="#e83e8c">Week</tspan> today = <tspan fill="#e83e8c">Week</tspan>.<tspan fill="#fd7e14">MONDAY</tspan>;</text>
    <text x="20" y="60" class="code-text"><tspan fill="#e83e8c">Week</tspan> next = <tspan fill="#e83e8c">Week</tspan>.<tspan fill="#fd7e14">MONDAY</tspan>;</text>
  </g>

  <!-- 스택 영역 -->
  <g transform="translate(60, 160)">
    <rect width="200" height="240" rx="10" fill="#e2e3e5" stroke="#adb5bd" stroke-width="2"/>
    <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#495057" text-anchor="middle">스택(Stack) 영역</text>
    
    <!-- today 변수 -->
    <g transform="translate(20, 60)">
      <rect width="160" height="60" rx="4" fill="#fff" stroke="#198754" stroke-width="2"/>
      <text x="80" y="25" class="box-title" text-anchor="middle">today 변수</text>
      <text x="80" y="45" font-family="sans-serif" font-size="14" fill="#198754" font-weight="bold" text-anchor="middle">주소: xM</text>
    </g>

    <!-- next 변수 -->
    <g transform="translate(20, 150)">
      <rect width="160" height="60" rx="4" fill="#fff" stroke="#198754" stroke-width="2"/>
      <text x="80" y="25" class="box-title" text-anchor="middle">next 변수</text>
      <text x="80" y="45" font-family="sans-serif" font-size="14" fill="#198754" font-weight="bold" text-anchor="middle">주소: xM</text>
    </g>
  </g>

  <!-- 메소드 (메타스페이스) 영역 안의 Enum 상수들 -->
  <g transform="translate(420, 80)">
    <rect width="320" height="320" rx="10" fill="#e2e3e5" stroke="#adb5bd" stroke-width="2"/>
    <text x="160" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#495057" text-anchor="middle">메소드(메타스페이스) 영역</text>
    
    <g transform="translate(30, 50)">
      <rect width="260" height="240" fill="#fff" stroke="#6f42c1" stroke-width="3" rx="5"/>
      <text x="130" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6f42c1" text-anchor="middle">Week 클래스 (메타 데이터)</text>
      
      <!-- static final 인스턴스 영역 -->
      <g transform="translate(40, 45)">
        <text x="90" y="-5" font-family="sans-serif" font-size="12" fill="#6c757d" font-weight="bold" text-anchor="middle">Enum 상수 인스턴스들</text>
        <rect width="180" height="170" fill="none" stroke="#adb5bd" stroke-dasharray="4" rx="4"/>
        
        <rect class="anim-obj" x="15" y="15" width="150" height="30" stroke="#0d6efd" stroke-width="2" rx="3"/>
        <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#0d6efd" text-anchor="middle">MONDAY (xM)</text>
        
        <rect x="15" y="60" width="150" height="30" fill="#f8f9fa" stroke="#adb5bd" rx="3"/>
        <text x="90" y="80" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6c757d" text-anchor="middle">TUESDAY (xT)</text>

        <rect x="15" y="105" width="150" height="30" fill="#f8f9fa" stroke="#adb5bd" rx="3"/>
        <text x="90" y="125" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6c757d" text-anchor="middle">WEDNESDAY (xW)</text>
      </g>
    </g>
  </g>

  <!-- 가리키는 화살표 연출 -->
  <path d="M 240 250 Q 300 180 500 180" fill="none" class="anim-link" marker-end="url(#arrow-cyan)"/>
  <path d="M 240 340 Q 350 200 500 185" fill="none" class="anim-link" marker-end="url(#arrow-cyan)"/>
  
  <text x="350" y="160" font-family="sans-serif" font-size="16" font-weight="bold" fill="#dc3545">today == next (True!)</text>
  <text x="350" y="180" font-family="sans-serif" font-size="12" fill="#6c757d">같은 리모컨 주소(xM) 소유</text>

  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0dcaf0"/>
    </marker>
  </defs>
</svg>
