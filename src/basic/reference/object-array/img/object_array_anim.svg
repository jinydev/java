<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes zap {
      0%, 15% { stroke-dashoffset: 100; opacity: 0; }
      20%, 80% { stroke-dashoffset: 0; opacity: 1; filter: drop-shadow(0 0 8px #0dcaf0); }
      85%, 100% { opacity: 0; }
    }
    @keyframes turn-on-tv {
      0%, 25% { fill: #343a40; }
      30%, 75% { fill: #e0f8f8; filter: drop-shadow(0 0 15px #0dcaf0); }
      80%, 100% { fill: #343a40; }
    }
    @keyframes show-text {
      0%, 25% { opacity: 0; }
      30%, 75% { opacity: 1; text-shadow: 0 0 5px #fff; }
      80%, 100% { opacity: 0; }
    }
    @keyframes float-cloud {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .anim-zap { animation: zap 6s infinite; stroke-dasharray: 100; }
    .anim-zap-delay1 { animation: zap 6s infinite 0.5s; stroke-dasharray: 100; }
    .anim-zap-delay2 { animation: zap 6s infinite 1s; stroke-dasharray: 100; }
    
    .anim-tv { animation: turn-on-tv 6s infinite; }
    .anim-tv-delay1 { animation: turn-on-tv 6s infinite 0.5s; }
    .anim-tv-delay2 { animation: turn-on-tv 6s infinite 1s; }

    .anim-text { animation: show-text 6s infinite; }
    .anim-text-delay1 { animation: show-text 6s infinite 0.5s; }
    .anim-text-delay2 { animation: show-text 6s infinite 1s; }

    .anim-cloud { animation: float-cloud 4s infinite ease-in-out; }
    .anim-cloud-delay { animation: float-cloud 4.5s infinite ease-in-out 1s; }

    .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #333; text-anchor: middle; }
    .code { font-family: monospace; font-size: 16px; font-weight: bold; }
    .label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #6c757d; text-anchor: middle; }
  </style>

  <text x="400" y="50" class="title">객체 배열: 리모컨(참조 주소)이 든 상자들 📡</text>
  <text x="400" y="80" class="code" fill="#0d6efd" text-anchor="middle">String[] strArray = new String[3];</text>

  <!-- 하단: 배열 (스택/힙의 배열체) -->
  <g transform="translate(150, 280)">
    <rect x="0" y="0" width="500" height="80" rx="10" fill="#e9ecef" stroke="#adb5bd" stroke-width="4"/>
    <text x="-50" y="45" font-family="sans-serif" font-size="16" font-weight="bold" fill="#495057">배열 객체</text>
    
    <!-- 방 3개 (리모컨들) -->
    <!-- [0] 리모컨 -->
    <rect x="30" y="15" width="100" height="50" rx="5" fill="#212529"/>
    <circle cx="80" cy="40" r="10" fill="#dc3545"/> <!-- 버튼 -->
    <text x="80" y="95" class="label">strArray[0]</text>
    
    <!-- [1] 리모컨 -->
    <rect x="200" y="15" width="100" height="50" rx="5" fill="#212529"/>
    <circle cx="250" cy="40" r="10" fill="#dc3545"/>
    <text x="250" y="95" class="label">strArray[1]</text>
    
    <!-- [2] 리모컨 -->
    <rect x="370" y="15" width="100" height="50" rx="5" fill="#212529"/>
    <circle cx="420" cy="40" r="10" fill="#dc3545"/>
    <text x="420" y="95" class="label">strArray[2]</text>
  </g>

  <!-- 상단: 실제 객체들 (힙 내 다른 공간의 TV들) -->
  <!-- 구름 배경 -->
  <g class="anim-cloud" transform="translate(230, 160)">
    <path d="M -80 0 Q -60 -30 -30 -10 Q 0 -40 30 -10 Q 50 -20 70 0 Z" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
  </g>
  <g class="anim-cloud-delay" transform="translate(400, 140)">
    <path d="M -80 0 Q -60 -30 -30 -10 Q 0 -40 30 -10 Q 50 -20 70 0 Z" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
  </g>
  <g class="anim-cloud" transform="translate(570, 160)">
    <path d="M -80 0 Q -60 -30 -30 -10 Q 0 -40 30 -10 Q 50 -20 70 0 Z" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
  </g>

  <!-- TV 1 -->
  <g transform="translate(230, 140)">
    <rect x="-60" y="-40" width="120" height="80" rx="5" fill="#212529" stroke="#343a40" stroke-width="5"/>
    <rect x="-50" y="-30" width="100" height="60" rx="3" class="anim-tv"/>
    <text x="0" y="8" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle" class="anim-text">"Java"</text>
    <text x="0" y="60" class="label">문자열 객체</text>
  </g>

  <!-- TV 2 -->
  <g transform="translate(400, 120)">
    <rect x="-60" y="-40" width="120" height="80" rx="5" fill="#212529" stroke="#343a40" stroke-width="5"/>
    <rect x="-50" y="-30" width="100" height="60" rx="3" class="anim-tv-delay1"/>
    <text x="0" y="8" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle" class="anim-text-delay1">"C++"</text>
    <text x="0" y="60" class="label">문자열 객체</text>
  </g>

  <!-- TV 3 -->
  <g transform="translate(570, 140)">
    <rect x="-60" y="-40" width="120" height="80" rx="5" fill="#212529" stroke="#343a40" stroke-width="5"/>
    <rect x="-50" y="-30" width="100" height="60" rx="3" class="anim-tv-delay2"/>
    <text x="0" y="8" font-family="sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle" class="anim-text-delay2">"C#"</text>
    <text x="0" y="60" class="label">문자열 객체</text>
  </g>

  <!-- 연결선 (레이저) -->
  <path d="M 230 280 L 230 180" fill="none" class="anim-zap" stroke="#0dcaf0" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 400 280 L 400 160" fill="none" class="anim-zap-delay1" stroke="#0dcaf0" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 570 280 L 570 180" fill="none" class="anim-zap-delay2" stroke="#0dcaf0" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- 하단 툴팁 -->
  <rect x="150" y="400" width="500" height="40" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="400" y="426" font-family="sans-serif" font-size="16" font-weight="bold" fill="#856404" text-anchor="middle">💡 배열 안에는 "Java"라는 글자가 없습니다! 객체가 있는 주소(리모컨)만 들어있죠!</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0dcaf0"/>
    </marker>
  </defs>
</svg>
