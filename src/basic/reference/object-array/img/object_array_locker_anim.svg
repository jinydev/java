<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes press-key {
      0%, 20% { transform: scale(1); filter: none; }
      25%, 35% { transform: scale(0.9); filter: drop-shadow(0 0 5px #0dcaf0); }
      40%, 100% { transform: scale(1); filter: none; }
    }
    @keyframes signal-wave {
      0%, 30% { stroke-dashoffset: 200; opacity: 0; }
      40%, 60% { stroke-dashoffset: 0; opacity: 1; filter: drop-shadow(0 0 8px #ffc107); }
      70%, 100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes car-react {
      0%, 45% { transform: translateY(0); filter: none; }
      50%, 55% { transform: translateY(-10px); filter: drop-shadow(0 0 15px #198754); }
      60%, 100% { transform: translateY(0); filter: none; }
    }
    
    .anim-key { animation: press-key 4s infinite; transform-origin: center; }
    .anim-signal { animation: signal-wave 4s infinite; stroke-dasharray: 200; }
    .anim-car { animation: car-react 4s infinite; }
    
    .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #333; text-anchor: middle; }
    .label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #6c757d; text-anchor: middle; }
    .code { font-family: monospace; font-size: 18px; font-weight: bold; }
  </style>

  <text x="400" y="50" class="title">사물함(배열) 안에는 자동차가 들어가지 않는다! 🚗🔑</text>

  <!-- 사물함 (배열 요소들) -->
  <g transform="translate(100, 150)">
    <!-- 사물함 박스 3개 -->
    <rect x="0" y="0" width="120" height="150" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="4"/>
    <rect x="140" y="0" width="120" height="150" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="4"/>
    <rect x="280" y="0" width="120" height="150" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="4"/>
    
    <!-- 인덱스 번호 -->
    <text x="60" y="-10" class="code" fill="#0d6efd">[0]</text>
    <text x="200" y="-10" class="code" fill="#6c757d">[1]</text>
    <text x="340" y="-10" class="code" fill="#6c757d">[2]</text>

    <!-- [0]번함 내부: 차 키(리모컨) -->
    <g class="anim-key" transform="translate(60, 75)">
      <rect x="-20" y="-30" width="40" height="60" rx="10" fill="#212529"/>
      <circle cx="0" cy="-10" r="8" fill="#dc3545"/> <!-- 버튼 -->
      <path d="M -10 10 L 10 10 M -10 20 L 10 20" stroke="#6c757d" stroke-width="2"/>
    </g>

    <!-- [1], [2]번함 내부: 그냥 차 키 -->
    <g transform="translate(200, 75)">
      <rect x="-20" y="-30" width="40" height="60" rx="10" fill="#212529"/>
      <circle cx="0" cy="-10" r="8" fill="#6c757d"/>
    </g>
    <g transform="translate(340, 75)">
      <rect x="-20" y="-30" width="40" height="60" rx="10" fill="#212529"/>
      <circle cx="0" cy="-10" r="8" fill="#6c757d"/>
    </g>
    
    <text x="200" y="180" font-family="sans-serif" font-size="16" font-weight="bold" fill="#495057" text-anchor="middle">Car[] parkingLot = new Car[3];</text>
  </g>

  <!-- 거대 주차장 (Heap 영역) -->
  <g transform="translate(580, 200)">
    <!-- 땅바닥 -->
    <ellipse cx="50" cy="50" rx="120" ry="40" fill="#d1e7dd"/>
    <text x="50" y="110" font-family="sans-serif" font-size="16" font-weight="bold" fill="#198754" text-anchor="middle">거대 외부 주차장 (Heap)</text>
    
    <!-- 실제 자동차 객체 -->
    <g class="anim-car" transform="translate(0, 0)">
      <path d="M -40 20 L -30 -10 L 20 -10 L 40 20 Z" fill="#0dcaf0"/>
      <rect x="-50" y="20" width="100" height="30" rx="10" fill="#0dcaf0"/>
      <circle cx="-30" cy="50" r="15" fill="#212529"/>
      <circle cx="30" cy="50" r="15" fill="#212529"/>
      <text x="0" y="40" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">진짜 "Benz"</text>
    </g>
  </g>

  <!-- 전파 신호 (Reference Link) -->
  <path d="M 200 215 Q 400 100 580 200" fill="none" class="anim-signal" stroke="#ffc107" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow-yellow)"/>

  <!-- 하단 툴팁 -->
  <rect x="50" y="380" width="700" height="40" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="400" y="406" font-family="sans-serif" font-size="16" font-weight="bold" fill="#856404" text-anchor="middle">💡 만약 사물함에 진짜 차가 들어간다면 사물함이 터져버리겠죠? 객체 배열도 똑같습니다!</text>

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffc107"/>
    </marker>
  </defs>
</svg>
