<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes move-money { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
    @keyframes pulse-map { 0%, 100% { fill: #fff3cd; } 50% { fill: #ffecb5; } }
    @keyframes dash-line { to { stroke-dashoffset: -20; } }
    
    .money { animation: move-money 2s ease-in-out infinite; }
    .map { animation: pulse-map 2s infinite; }
    .link-line { stroke: #0d6efd; stroke-width: 3; stroke-dasharray: 5 5; animation: dash-line 1s linear infinite; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">데이터 타입의 근본적인 차이</text>

  <!-- 기본 타입 (Primitive) -->
  <g transform="translate(50, 80)">
    <rect width="320" height="320" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="2"/>
    <rect width="320" height="50" rx="10" fill="#e9ecef" stroke="none"/>
    <text x="160" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#495057" text-anchor="middle">기본 타입 (Primitive)</text>
    
    <text x="160" y="80" font-family="monospace" font-size="18" fill="#198754" font-weight="bold" text-anchor="middle">int money = 50000;</text>
    
    <!-- 변수 박스 -->
    <rect x="110" y="110" width="100" height="120" rx="5" fill="#f8f9fa" stroke="#198754" stroke-width="3"/>
    <text x="160" y="140" font-family="sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">변수 상자</text>
    
    <!-- 실제 값 (돈) -->
    <g class="money" transform="translate(130, 160)">
      <rect width="60" height="30" rx="2" fill="#d1e7dd" stroke="#0f5132" stroke-width="2"/>
      <text x="30" y="18" font-family="sans-serif" font-size="10" font-weight="bold" fill="#0f5132" text-anchor="middle">₩50,000</text>
      <circle cx="30" cy="15" r="8" fill="none" stroke="#0f5132" stroke-width="1"/>
    </g>

    <text x="160" y="270" font-family="sans-serif" font-size="16" fill="#198754" font-weight="bold" text-anchor="middle">"상자 안에 진짜 현금이 들어있다!"</text>
    <text x="160" y="295" font-family="sans-serif" font-size="13" fill="#6c757d" text-anchor="middle">값 자체를 직접 저장하므로 매우 빠르고 가벼움.</text>
  </g>

  <!-- 참조 타입 (Reference) -->
  <g transform="translate(430, 80)">
    <rect width="320" height="320" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="2"/>
    <rect width="320" height="50" rx="10" fill="#e9ecef" stroke="none"/>
    <text x="160" y="32" font-family="sans-serif" font-size="20" font-weight="bold" fill="#495057" text-anchor="middle">참조 타입 (Reference)</text>
    
    <text x="160" y="80" font-family="monospace" font-size="18" fill="#0d6efd" font-weight="bold" text-anchor="middle">String map = "보물섬";</text>
    
    <!-- 스택 박스 -->
    <rect x="50" y="110" width="80" height="80" rx="5" fill="#f8f9fa" stroke="#0d6efd" stroke-width="3"/>
    <text x="90" y="130" font-family="sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">변수 상자</text>
    
    <!-- 보물 지도 (주소) -->
    <rect class="map" x="65" y="150" width="50" height="30" rx="2" stroke="#b48608" stroke-width="2"/>
    <text x="90" y="168" font-family="sans-serif" font-size="10" font-weight="bold" fill="#b48608" text-anchor="middle">주소: x9</text>

    <!-- 연결선 -->
    <path d="M 135 150 Q 180 120 200 150" fill="none" class="link-line" marker-end="url(#arrow)"/>

    <!-- 힙 박스 (보물상자) -->
    <rect x="210" y="110" width="90" height="80" rx="5" fill="#e2e3e5" stroke="#495057" stroke-width="3"/>
    <text x="255" y="130" font-family="sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">어딘가</text>
    
    <!-- 보물 -->
    <g transform="translate(230, 145)">
      <path d="M 0 10 Q 25 0 50 10 L 50 35 Q 25 45 0 35 Z" fill="#ffc107" stroke="#b48608" stroke-width="2"/>
      <rect x="20" y="15" width="10" height="10" fill="#b48608"/>
      <text x="25" y="15" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">"보물섬"</text>
    </g>

    <text x="160" y="270" font-family="sans-serif" font-size="16" fill="#0d6efd" font-weight="bold" text-anchor="middle">"상자엔 지도만! 보물은 창고에!"</text>
    <text x="160" y="295" font-family="sans-serif" font-size="13" fill="#6c757d" text-anchor="middle">주소(좌표)만 저장하고 실제 큰 데이터는 밖에 보관.</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d6efd"/>
    </marker>
  </defs>
</svg>
