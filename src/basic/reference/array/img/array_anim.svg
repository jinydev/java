<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="350" fill="#f8f9fa"/>
  <style>
    @keyframes highlight { 0%, 100% { stroke: #0d6efd; stroke-width: 2; } 50% { stroke: #dc3545; stroke-width: 5; } }
    @keyframes code-focus { 0%, 100% { fill: #212529; } 50% { fill: #dc3545; } }
    @keyframes pointer-move { 
      0% { transform: translate(150px, 130px); } 
      25% { transform: translate(270px, 130px); }
      50% { transform: translate(390px, 130px); }
      75% { transform: translate(510px, 130px); }
      100% { transform: translate(630px, 130px); }
    }
    
    .box-1 { animation: highlight 5s infinite 0.5s; }
    .box-2 { animation: highlight 5s infinite 1.75s; }
    .box-3 { animation: highlight 5s infinite 3s; }
    .box-4 { animation: highlight 5s infinite 4.25s; }
    .ErrorBox { stroke: #dc3545; stroke-width: 5; fill: #f8d7da; stroke-dasharray: 4; }
    
    .code-msg { animation: code-focus 5s infinite; }
    .pointer { animation: pointer-move 5s infinite; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">배열 객체의 메모리 구조 및 인덱스 접근</text>

  <!-- 배열 선언 코드 -->
  <g transform="translate(250, 70)">
    <rect width="300" height="40" rx="5" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <text x="150" y="27" class="code-msg" font-family="monospace" font-size="18" font-weight="bold" text-anchor="middle">int[] scores = new int[4];</text>
  </g>

  <!-- 주소 변수 (스택) -->
  <g transform="translate(50, 180)">
    <rect width="100" height="60" rx="5" fill="#fff" stroke="#198754" stroke-width="3"/>
    <text x="50" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#198754" text-anchor="middle">scores</text>
    <text x="50" y="48" font-family="monospace" font-size="12" fill="#6c757d" text-anchor="middle">(주소: xF)</text>
    <!-- 연결선 -->
    <path d="M 150 210 L 220 210" fill="none" stroke="#198754" stroke-width="4" marker-end="url(#arrow-green)"/>
  </g>

  <!-- 배열 객체 (힙) -->
  <g transform="translate(240, 160)">
    <!-- 힙 배경 박스 -->
    <rect width="490" height="100" rx="8" fill="#e2e3e5" stroke="#adb5bd" stroke-width="2"/>
    <text x="245" y="25" font-family="sans-serif" font-size="14" font-weight="bold" fill="#495057" text-anchor="middle">힙(Heap) 영역의 연속적인 공간 (길이 length: 4)</text>

    <!-- 배열 인덱스 상자들 -->
    <g transform="translate(10, 40)">
      <rect class="box-1" x="0" y="0" width="100" height="50" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
      <text x="50" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">90</text>
      <rect x="0" y="50" width="100" height="20" fill="#0d6efd"/>
      <text x="50" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">[0]</text>
      
      <rect class="box-2" x="120" y="0" width="100" height="50" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
      <text x="170" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">80</text>
      <rect x="120" y="50" width="100" height="20" fill="#0d6efd"/>
      <text x="170" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">[1]</text>
      
      <rect class="box-3" x="240" y="0" width="100" height="50" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
      <text x="290" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">70</text>
      <rect x="240" y="50" width="100" height="20" fill="#0d6efd"/>
      <text x="290" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">[2]</text>
      
      <rect class="box-4" x="360" y="0" width="100" height="50" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
      <text x="410" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#333" text-anchor="middle">60</text>
      <rect x="360" y="50" width="100" height="20" fill="#0d6efd"/>
      <text x="410" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">[3]</text>
    </g>
  </g>

  <!-- 가짜 방명록 에러 (인덱스 4) -->
  <g transform="translate(740, 200)">
    <rect class="ErrorBox" x="0" y="0" width="40" height="50" />
    <text x="20" y="30" font-family="sans-serif" font-size="20" font-weight="bold" fill="#dc3545" text-anchor="middle">X</text>
    <rect x="0" y="50" width="40" height="20" fill="#dc3545"/>
    <text x="20" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">[4]</text>
    <text x="-40" y="-15" font-family="sans-serif" font-size="12" font-weight="bold" fill="#dc3545" text-anchor="middle">IndexOutOfBoundsException!</text>
  </g>

  <!-- 순회하는 포인터 화살표 -->
  <g class="pointer">
    <path d="M 0 0 L 10 -20 L -10 -20 Z" fill="#dc3545"/>
  </g>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#198754"/>
    </marker>
  </defs>
</svg>
