<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes move-wrong {
      0%, 20% { transform: translateX(0); opacity: 1; }
      40% { transform: translateX(180px); opacity: 1; }
      50% { transform: translateX(160px) rotate(-10deg); opacity: 1; filter: drop-shadow(0 0 10px red); }
      70%, 100% { transform: translateX(160px) rotate(-10deg); opacity: 0; }
    }
    @keyframes show-x {
      0%, 45% { opacity: 0; transform: scale(0); }
      50%, 65% { opacity: 1; transform: scale(1); }
      70%, 100% { opacity: 0; transform: scale(0); }
    }
    @keyframes move-right {
      0%, 60% { transform: translateX(0); opacity: 0; }
      70%, 80% { transform: translateX(0); opacity: 1; }
      90%, 100% { transform: translateX(200px); opacity: 1; }
    }
    @keyframes glow-method {
      0%, 85% { filter: drop-shadow(0 0 0 transparent); }
      90%, 100% { filter: drop-shadow(0 0 10px #0dcaf0); }
    }
    
    .anim-wrong { animation: move-wrong 7s infinite; }
    .anim-x { animation: show-x 7s infinite; transform-origin: center; }
    .anim-right { animation: move-right 7s infinite; }
    .anim-target { animation: glow-method 7s infinite; }
    
    .code { font-family: monospace; font-size: 18px; font-weight: bold; }
    .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #333; text-anchor: middle; }
    .label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #dc3545; text-anchor: middle; }
  </style>

  <text x="400" y="50" class="title">메소드 매개변수로 직접 배열 던지기 🎯</text>

  <!-- 수신측 메소드 -->
  <g transform="translate(500, 160)" class="anim-target">
    <rect width="250" height="150" rx="15" fill="#212529" stroke="#0dcaf0" stroke-width="4"/>
    <text x="125" y="40" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0dcaf0" text-anchor="middle">수신 메소드</text>
    <path d="M 20 55 L 230 55" stroke="#495057" stroke-width="2"/>
    <text x="20" y="85" class="code" fill="#fff">printArray( <tspan fill="#fd7e14">int[]</tspan> arr )</text>
    <text x="50" y="115" class="code" fill="#6c757d">{ ... }</text>
  </g>

  <!-- 1번 시도 (에러) -->
  <g transform="translate(50, 140)">
    <text x="10" y="0" class="code" fill="#6c757d">1. 컴파일 에러 (X)</text>
    
    <g class="anim-wrong" transform="translate(20, 20)">
      <rect width="160" height="40" rx="8" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
      <text x="80" y="26" class="code" fill="#dc3545" text-anchor="middle">printArray( <tspan fill="#000" text-decoration="underline">{1, 2}</tspan> )</text>
    </g>

    <!-- 에러 표시 X -->
    <g transform="translate(290, 40)" class="anim-x">
      <path d="M -25 -25 L 25 25 M -25 25 L 25 -25" stroke="#dc3545" stroke-width="8" stroke-linecap="round"/>
      <text x="0" y="50" class="label">덜렁 값만 넘길 수 없음!</text>
    </g>
  </g>

  <!-- 2번 시도 (정상) -->
  <g transform="translate(50, 280)">
    <text x="10" y="0" class="code" fill="#6c757d">2. 정상 동작 (O)</text>
    
    <g class="anim-right" transform="translate(20, 20)">
      <rect width="260" height="40" rx="8" fill="#d1e7dd" stroke="#198754" stroke-width="2"/>
      <text x="130" y="26" class="code" fill="#198754" text-anchor="middle">printArray( <tspan fill="#000">new int[]{1, 2}</tspan> )</text>
    </g>
  </g>

  <!-- 가이드 화살표 -->
  <path d="M 280 320 Q 380 320 480 260" fill="none" stroke="#198754" stroke-width="3" stroke-dasharray="10 5" marker-end="url(#arrow-green)"/>
  
  <rect x="150" y="400" width="500" height="40" rx="10" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="400" y="426" font-family="sans-serif" font-size="16" font-weight="bold" fill="#856404" text-anchor="middle">💡 인자로 바로 쏠 때는, 무조건 "객체를 생성한다"는 명시적 선언이 필수!</text>

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#198754"/>
    </marker>
  </defs>

</svg>
