<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <style>
    @keyframes pulse {
      0%, 100% { fill: #dc3545; r: 35; }
      50% { fill: #ff4757; r: 42; }
    }
    @keyframes zap {
      0% { stroke-dashoffset: 200; opacity: 0; }
      20% { opacity: 1; }
      80% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -50; opacity: 0; }
    }
    @keyframes shock {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      20% { transform: translate(-5px, 3px) rotate(-2deg); }
      40% { transform: translate(5px, -3px) rotate(2deg); }
      60% { transform: translate(-3px, -5px) rotate(-1deg); }
      80% { transform: translate(3px, 5px) rotate(1deg); }
    }
    .laser {
      stroke: #dc3545;
      stroke-width: 4;
      stroke-dasharray: 10 10;
      animation: zap 2s linear infinite;
    }
    .bomb {
      transform-origin: 650px 250px;
      animation: shock 2s infinite;
    }
  </style>

  <!-- Stack 영역 -->
  <rect x="50" y="50" width="300" height="400" rx="10" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
  <text x="200" y="90" font-family="sans-serif" font-size="24" font-weight="bold" fill="#495057" text-anchor="middle">Stack (스택 책상)</text>

  <!-- Heap 영역 -->
  <rect x="450" y="50" width="300" height="400" rx="10" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
  <text x="600" y="90" font-family="sans-serif" font-size="24" font-weight="bold" fill="#495057" text-anchor="middle">Heap (힙 창고)</text>

  <!-- 변수 1 (정상 참조) -->
  <g transform="translate(70, 130)">
    <rect width="260" height="80" rx="5" fill="#fff" stroke="#0d6efd" stroke-width="2"/>
    <text x="130" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="#0d6efd" text-anchor="middle">String str1 = "자바";</text>
    <rect x="20" y="45" width="220" height="25" rx="3" fill="#cff4fc"/>
    <text x="130" y="62" font-family="sans-serif" font-size="14" fill="#055160" text-anchor="middle">주소값: 0x1A2B</text>
  </g>

  <!-- 객체 1 -->
  <g transform="translate(470, 130)">
    <rect width="260" height="80" rx="5" fill="#fff" stroke="#198754" stroke-width="2"/>
    <text x="130" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="#198754" text-anchor="middle">"자바"</text>
    <text x="130" y="60" font-family="sans-serif" font-size="14" fill="#0f5132" text-anchor="middle">0x1A2B 번지</text>
  </g>

  <!-- 정상 참조선 -->
  <path d="M 330 170 Q 400 130 460 170" fill="none" stroke="#0d6efd" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 변수 2 (Null) -->
  <g transform="translate(70, 280)">
    <rect width="260" height="120" rx="5" fill="#fff" stroke="#dc3545" stroke-width="3"/>
    <text x="130" y="35" font-family="monospace" font-size="18" font-weight="bold" fill="#dc3545" text-anchor="middle">String str2 = null;</text>
    <rect x="20" y="50" width="220" height="25" rx="3" fill="#f8d7da"/>
    <text x="130" y="67" font-family="sans-serif" font-size="14" font-weight="bold" fill="#842029" text-anchor="middle">주소: 없음 (텅 빔)</text>
    <text x="130" y="100" font-family="monospace" font-size="16" fill="#dc3545" text-anchor="middle">str2.length() 💣</text>
  </g>

  <!-- Null 에러 빔 -->
  <path d="M 330 350 L 590 350" fill="none" class="laser"/>
  
  <text x="460" y="330" font-family="sans-serif" font-size="16" font-weight="bold" fill="#dc3545" opacity="0.8">어디로 가라고??</text>

  <!-- 폭발 효과 -->
  <g class="bomb">
    <circle cx="650" cy="350" r="40" fill="#dc3545" style="animation: pulse 1s infinite;"/>
    <text x="650" y="358" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">ERROR!</text>
    <circle cx="650" cy="350" r="50" fill="none" stroke="#dc3545" stroke-width="3" stroke-dasharray="5 10"/>
    
    <!-- 찌릿찌릿 -->
    <path d="M 620 300 Q 640 280 630 260" fill="none" class="laser"/>
    <path d="M 680 300 Q 660 280 670 260" fill="none" class="laser"/>
    <path d="M 700 350 Q 720 370 740 360" fill="none" class="laser"/>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d6efd"/>
    </marker>
  </defs>
</svg>
