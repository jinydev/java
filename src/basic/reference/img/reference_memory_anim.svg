<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">스택(Stack)과 힙(Heap): 리모컨과 거대한 TV 📺</text>

    <!-- Stack Memory Area (Left) -->
    <g transform="translate(50, 80)">
        <rect width="250" height="320" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3" />
        <rect width="250" height="40" rx="10" fill="#e2e8f0" />
        <text x="125" y="27" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#334155" font-weight="bold" text-anchor="middle">스택 영역 (내 책상)</text>
        <text x="125" y="380" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">작고, 빠르고, 찾기 쉬운 곳</text>

        <!-- Primitive Variable (Post-it note) -->
        <g transform="translate(20, 60)">
            <rect width="210" height="60" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
            <text x="10" y="25" font-family="monospace" font-size="14" fill="#854d0e" font-weight="bold">int age; (기본 타입)</text>
            <text x="10" y="45" font-family="monospace" font-size="18" fill="#b45309" font-weight="bold">값: 15 (직접 보관)</text>
        </g>

        <!-- Reference Variable (Remote Control) -->
        <g transform="translate(20, 150)">
            <rect width="210" height="120" rx="15" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" />
            <text x="10" y="30" font-family="monospace" font-size="14" fill="#1e3a8a" font-weight="bold">String myTv; (참조 타입)</text>
            
            <!-- Remote Drawing -->
            <rect x="70" y="45" width="70" height="60" rx="10" fill="#1e293b" />
            <circle cx="105" cy="60" r="8" fill="#ef4444" />
            <circle cx="90" cy="85" r="5" fill="#94a3b8" />
            <circle cx="120" cy="85" r="5" fill="#94a3b8" />
            
            <text x="105" y="140" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#1d4ed8" font-weight="bold" text-anchor="middle">TV는 어딨어? (주소 보관)</text>
        </g>
    </g>

    <!-- Heap Memory Area (Right) -->
    <g transform="translate(450, 80)">
        <rect width="300" height="320" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="3" />
        <rect width="300" height="40" rx="10" fill="#fbcfe8" />
        <text x="150" y="27" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#831843" font-weight="bold" text-anchor="middle">힙 영역 (거대한 물류 창고)</text>
        <text x="150" y="380" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#9d174d" text-anchor="middle">크고, 무겁고, 복잡한 물건 보관소</text>

        <!-- The Object (Giant TV) -->
        <g transform="translate(30, 80)">
            <!-- Box representing the memory block -->
            <rect width="240" height="150" rx="10" fill="#ffffff" stroke="#e11d48" stroke-width="3" stroke-dasharray="8,4" />
            
            <!-- Memory Address Label -->
            <rect x="60" y="-15" width="120" height="30" rx="15" fill="#e11d48" />
            <text x="120" y="5" font-family="monospace" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle">주소: 0x100A</text>

            <!-- TV Drawing -->
            <rect x="20" y="30" width="200" height="100" fill="#0f172a" rx="5" />
            <rect x="25" y="35" width="190" height="90" fill="#38bdf8" />
            <text x="120" y="85" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">"디즈니+"</text>
            <text x="120" y="110" font-family="monospace" font-size="14" fill="#0284c7" font-weight="bold" text-anchor="middle">String 객체 (진짜 데이터)</text>
        </g>
    </g>

    <!-- The Laser Beam (Reference / Pointer) -->
    <!-- Start point: Remote control (Left 255, y=300) -->
    <!-- End point: TV object address (Right 450+90, y=145) -->
    <g>
        <path d="M 280 255 C 360 255, 380 145, 500 145" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5" marker-end="url(#laser-arrow)">
            <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
        </path>
    </g>
    
    <!-- Pulse text for the laser -->
    <text x="390" y="195" font-family="monospace" font-size="16" fill="#dc2626" font-weight="bold" text-anchor="middle" transform="rotate(-30 390 195)">
        <tspan>리모컨 빔 (0x100A 번지)</tspan>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
    </text>

    <!-- Arrowhead definition -->
    <defs>
        <marker id="laser-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
        </marker>
    </defs>
</svg>
