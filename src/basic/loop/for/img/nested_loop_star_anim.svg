<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <!-- background -->
    <rect width="800" height="400" fill="#f8fafc" rx="15" />
    <rect width="796" height="396" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />

    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">중첩 for 문 (별 찍기) 애니메이션 🌟</text>

    <!-- Code Block -->
    <rect x="30" y="90" width="400" height="150" rx="5" fill="#1e1e1e" />
    <text x="50" y="120" font-family="monospace" font-size="16" fill="#c586c0">for<tspan fill="#d4d4d4">(int </tspan><tspan fill="#9cdcfe">i</tspan><tspan fill="#d4d4d4">=1; </tspan><tspan fill="#9cdcfe">i</tspan><tspan fill="#d4d4d4">&lt;=4; </tspan><tspan fill="#9cdcfe">i</tspan><tspan fill="#d4d4d4">++) {</tspan></text>
    <text x="90" y="150" font-family="monospace" font-size="16" fill="#c586c0">for<tspan fill="#d4d4d4">(int </tspan><tspan fill="#9cdcfe">j</tspan><tspan fill="#d4d4d4">=1; </tspan><tspan fill="#9cdcfe">j</tspan><tspan fill="#d4d4d4">&lt;=</tspan><tspan fill="#9cdcfe">i</tspan><tspan fill="#d4d4d4">; </tspan><tspan fill="#9cdcfe">j</tspan><tspan fill="#d4d4d4">++) {</tspan></text>
    <text x="130" y="180" font-family="monospace" font-size="16" fill="#4ec9b0">System<tspan fill="#d4d4d4">.</tspan><tspan fill="#dcdcaa">out</tspan><tspan fill="#d4d4d4">.</tspan><tspan fill="#dcdcaa">print</tspan><tspan fill="#d4d4d4">(</tspan><tspan fill="#ce9178">"*"</tspan><tspan fill="#d4d4d4">);</tspan></text>
    <text x="90" y="210" font-family="monospace" font-size="16" fill="#d4d4d4">}</text>
    <text x="50" y="240" font-family="monospace" font-size="16" fill="#d4d4d4">}</text>

    <!-- i and j indicator -->
    <text x="460" y="120" font-family="monospace" font-size="18" fill="#ef4444" font-weight="bold">i (바깥 루프 - 줄바꿈) = 
        <tspan opacity="1"><animate attributeName="opacity" values="1;0;0;0" keyTimes="0;0.25;0.5;1" dur="10s" repeatCount="indefinite"/>1줄</tspan>
        <tspan opacity="0" dx="-32"><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.25;0.5;1" dur="10s" repeatCount="indefinite"/>2줄</tspan>
        <tspan opacity="0" dx="-32"><animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.5;0.75;1" dur="10s" repeatCount="indefinite"/>3줄</tspan>
        <tspan opacity="0" dx="-32"><animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.75;1;1" dur="10s" repeatCount="indefinite"/>4줄</tspan>
    </text>
    <text x="460" y="160" font-family="monospace" font-size="18" fill="#3b82f6" font-weight="bold">j (안쪽 루프 - 별찍기) = 1 ~ i</text>

    <!-- Console Output Area -->
    <rect x="460" y="190" width="280" height="180" rx="5" fill="#000000" />
    <text x="480" y="215" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a3a3a3">Console Output:</text>
    <text x="480" y="250" font-family="monospace" font-size="30" fill="#fbbf24">
        <!-- row 1 -->
        <tspan x="480" dy="0">
            <tspan opacity="0"><animate attributeName="opacity" values="0;1;1;1;1" keyTimes="0;0.1;0.25;0.5;1" dur="10s" repeatCount="indefinite"/>*</tspan>
        </tspan>
        <!-- row 2 -->
        <tspan x="480" dy="35">
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.25;0.35;0.5;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.35;0.45;0.5;1" dur="10s" repeatCount="indefinite"/>*</tspan>
        </tspan>
        <!-- row 3 -->
        <tspan x="480" dy="35">
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.5;0.58;0.75;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.58;0.66;0.75;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.66;0.74;0.75;1" dur="10s" repeatCount="indefinite"/>*</tspan>
        </tspan>
        <!-- row 4 -->
        <tspan x="480" dy="35">
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.75;0.81;1;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.81;0.87;1;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.87;0.93;1;1" dur="10s" repeatCount="indefinite"/>*</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.93;0.99;1;1" dur="10s" repeatCount="indefinite"/>*</tspan>
        </tspan>
    </text>
    
    <text x="400" y="380" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" font-weight="bold" text-anchor="middle">설명: 바깥 루프(i)가 1칸 전진할 때, 안쪽 루프(j)는 1부터 i까지 미친듯이 빠르게 돌며 별을 찍습니다.</text>
</svg>
