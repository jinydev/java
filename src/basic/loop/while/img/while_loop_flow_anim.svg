<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">while 문 실행 흐름 (조건 의존형 반복문) 🔄</text>

    <!-- Global Loop Context -->
    <rect x="250" y="70" width="300" height="40" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
    <text x="400" y="96" font-family="monospace" font-size="18" fill="#a16207" font-weight="bold" text-anchor="middle">while ( <tspan fill="#d97706">조건식</tspan> ) { <tspan fill="#10b981">실행문</tspan> }</text>

    <!-- Cycle Diagram -->
    <g transform="translate(400, 220)">
        
        <!-- Entry Point -->
        <path d="M 0 -100 L 0 -50" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow-gray)" />
        <text x="0" y="-110" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" font-weight="bold" text-anchor="middle">진입</text>

        <!-- Condition Node (Center) -->
        <polygon points="0,-40 80,0 0,40 -80,0" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
        <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#a16207" font-weight="bold" text-anchor="middle">조건 검사</text>

        <!-- True Path to Execution -->
        <path d="M 0 40 L 0 100" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)" />
        <text x="-40" y="75" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#047857" font-weight="bold">True</text>

        <!-- Execution Node (Bottom) -->
        <rect width="180" height="50" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="2" x="-90" y="100" />
        <text x="0" y="130" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">코드 블록 `{}` 실행</text>

        <!-- Back to Condition -->
        <path d="M -90 125 L -160 125 L -160 0 L -80 0" fill="none" stroke="#ca8a04" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrow-yellow)" />
        <text x="-165" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#a16207" font-weight="bold" text-anchor="end">다시 검사하러 감</text>

        <!-- False Path to Exit -->
        <path d="M 80 0 L 160 0 L 160 60" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" />
        <text x="120" y="-10" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" font-weight="bold">False</text>

        <!-- Exit Node -->
        <rect x="120" y="60" width="80" height="40" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
        <text x="160" y="85" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" font-weight="bold" text-anchor="middle">루프 탈출</text>

        <!-- Animation Dot (True Cycle) -->
        <circle cx="0" cy="0" r="8" fill="#3b82f6">
            <animate attributeName="opacity" values="1;1;1;1;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 -80 L 0 -40 L 0 40 L 0 100 L -90 125 L -160 125 L -160 0 L -80 0" />
        </circle>

        <!-- Animation Dot (False Escape) -->
        <circle cx="0" cy="0" r="8" fill="#ef4444">
            <animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 0 L 80 0 L 160 0 L 160 60" />
        </circle>
    </g>

    <text x="400" y="440" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">while 문은 처음부터 '조건'만 묻고 통과시킵니다. 언제 끝날지 횟수를 모를 때 주로 씁니다.</text>
    <text x="400" y="470" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">단, 코드 블록 내부에서 언젠가 조건을 False로 만들어야 무한 루프에 빠지지 않습니다!</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
        <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ca8a04" /></marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#10b981" /></marker>
        <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
    </defs>
</svg>
