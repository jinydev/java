<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">CPU 클럭 사이클과 반복문 작동 원리 ⚙️</text>

    <!-- Global Loop Context -->
    <rect x="250" y="70" width="300" height="40" rx="5" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2" />
    <text x="400" y="96" font-family="monospace" font-size="18" fill="#1d4ed8" font-weight="bold" text-anchor="middle">for( <tspan fill="#ef4444">①</tspan> ; <tspan fill="#eab308">②</tspan> ; <tspan fill="#a855f7">④</tspan> ) { <tspan fill="#10b981">③</tspan> }</text>

    <!-- Cycle Diagram -->
    <g transform="translate(400, 260)">
        
        <!-- Center Gear (CPU Clock) -->
        <circle cx="0" cy="0" r="40" fill="#cbd5e1" stroke="#64748b" stroke-width="4" />
        <image href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14H11v-2h2v2zm0-4H11V7h2v5z'/></svg>" x="-12" y="-12" height="24" width="24" />
        <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#334155" font-weight="bold" text-anchor="middle">CPU</text>

        <!-- 1. Initialization (Start) -->
        <path d="M -300 -180 L -180 -100" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" />
        <g transform="translate(-180, -100)">
            <rect width="160" height="50" rx="25" fill="#fee2e2" stroke="#ef4444" stroke-width="2" x="-80" y="-25" />
            <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">① 초기화 (시작)</text>
        </g>
        
        <!-- To Condition -->
        <path d="M -100 -100 L -40 -30" fill="none" stroke="#eab308" stroke-width="4" marker-end="url(#arrow-yellow)" />

        <!-- 2. Condition (Top Right) -->
        <g transform="translate(0, -120)">
            <polygon points="0,-35 80,0 0,35 -80,0" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
            <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#a16207" font-weight="bold" text-anchor="middle">② 조건 판단 (끝?)</text>
        </g>

        <!-- True Path to Execution -->
        <path d="M 60 -90 L 150 0" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)" />
        <text x="110" y="-50" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#047857" font-weight="bold">True (반복)</text>

        <!-- False Path to Escape -->
        <path d="M 0 -155 L 0 -220 L 300 -220" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow-gray)" />
        <text x="15" y="-190" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" font-weight="bold">False (탈출)</text>

        <!-- End Node -->
        <rect x="300" y="-240" width="80" height="40" rx="5" fill="#e2e8f0" stroke="#64748b" stroke-width="2" />
        <text x="340" y="-215" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#334155" font-weight="bold" text-anchor="middle">루프 종료</text>

        <!-- 3. Execution (Bottom Right) -->
        <g transform="translate(180, 50)">
            <rect width="160" height="50" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="2" x="-80" y="-25" />
            <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">③ 코드 실행 (달림)</text>
        </g>

        <!-- To Increment -->
        <path d="M 100 70 L 0 140" fill="none" stroke="#a855f7" stroke-width="4" marker-end="url(#arrow-purple)" />

        <!-- 4. Increment (Bottom Left) -->
        <g transform="translate(0, 160)">
            <rect width="160" height="50" rx="25" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" x="-80" y="-25" />
            <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#7e22ce" font-weight="bold" text-anchor="middle">④ 증감 (+1 바퀴)</text>
        </g>

        <!-- Back to Condition -->
        <path d="M -80 140 L -50 0 L -20 -80" fill="none" stroke="#eab308" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrow-yellow)" />

        <!-- Animation Dot -->
        <circle cx="0" cy="0" r="10" fill="#3b82f6" opacity="0.8">
            <animateMotion dur="5s" repeatCount="indefinite" path="M -300 -180 L -180 -100 L -40 -30 L -10 -90 L 60 -90 L 150 0 L 180 30 L 100 70 L 0 140 L 0 140 L -80 140 L -50 0 L -20 -80" />
        </circle>
    </g>

    <text x="400" y="460" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">파란 공이 CPU 한 사이클을 추적합니다. 조건이 거짓이 되기 전까지 ② → ③ → ④ 를 끊임없이 회전합니다.</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
        <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#eab308" /></marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#10b981" /></marker>
        <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#a855f7" /></marker>
        <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
    </defs>
</svg>
