<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">break 문 탈출 원리 (중괄호 파괴!) 🔨</text>

    <!-- Code Block representation -->
    <rect x="250" y="80" width="300" height="280" rx="10" fill="#fef08a" stroke="#ca8a04" stroke-width="3" stroke-dasharray="10,5" />
    <text x="250" y="100" font-family="monospace" font-size="40" fill="#ca8a04" font-weight="bold" text-anchor="end">{</text>
    <text x="550" y="340" font-family="monospace" font-size="40" fill="#ca8a04" font-weight="bold" text-anchor="start">}</text>
    <text x="400" y="105" font-family="monospace" font-size="16" fill="#a16207" font-weight="bold" text-anchor="middle">while(true) 또는 switch() 블록</text>

    <!-- Cycle Diagram Inside Room -->
    <g transform="translate(400, 200)">
        
        <!-- Condition (if) -->
        <polygon points="0,-40 60,0 0,40 -60,0" fill="#bae6fd" stroke="#0284c7" stroke-width="2" />
        <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#0369a1" font-weight="bold" text-anchor="middle">if (탈출조건?)</text>

        <!-- Loop Back Path (False) -->
        <path d="M -60 0 L -100 0 L -100 -80 L 0 -80 L 0 -40" fill="none" stroke="#64748b" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrow-gray)" />
        <text x="-105" y="-40" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#64748b" font-weight="bold" text-anchor="end">False (계속)</text>

        <!-- Animation Dot (Looping) -->
        <circle cx="0" cy="0" r="6" fill="#64748b">
            <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.33;0.66;1" dur="2s" repeatCount="indefinite"/>
            <animateMotion dur="2s" repeatCount="indefinite" path="M 0 -40 L -60 0 L -100 0 L -100 -80 L 0 -80 L 0 -40" />
        </circle>

        <!-- Break path (True) -->
        <path d="M 60 0 L 120 0 L 120 70 L 220 70" fill="none" stroke="#ef4444" stroke-width="6" />
        
        <!-- Break Hammer Node -->
        <rect x="70" y="-20" width="80" height="40" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="110" y="5" font-family="monospace" font-size="20" fill="#b91c1c" font-weight="bold" text-anchor="middle">break;</text>
        <text x="45" y="-30" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ef4444" font-weight="bold">True!</text>

        <!-- Broken Wall Effect -->
        <path d="M 140 30 L 150 70 L 130 90 L 160 110 L 145 150" fill="none" stroke="#ca8a04" stroke-width="4" />
        <path d="M 160 50 L 150 70" fill="none" stroke="#ca8a04" stroke-width="2" />
        <circle cx="150" cy="70" r="20" fill="#fca5a5" opacity="0.5">
             <animate attributeName="r" values="0;30;0" dur="3s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Escaped Node -->
        <rect x="220" y="50" width="100" height="40" rx="20" fill="#dcfce7" stroke="#10b981" stroke-width="3" />
        <text x="270" y="76" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">중괄호 밖!</text>

        <!-- Animation Dot (Breaking) -->
        <circle cx="0" cy="0" r="8" fill="#ef4444">
            <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.4;0.9;1" dur="3s" repeatCount="indefinite"/>
            <animateMotion dur="3s" repeatCount="indefinite" path="M 0 0 L 60 0 L 120 0 L 120 70 L 220 70" />
        </circle>
    </g>

    <text x="400" y="420" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">break 를 만나는 순간, 뒤에 무슨 코드가 있건 상관없이 가장 가까운 우측 중괄호 `}` 를 박살내고 나갑니다!</text>
    <text x="400" y="450" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">그래서 if 조건문과 세트로 쓰여 "이런 조건이면 즉시 쳇바퀴를 멈춰라!" 라는 뜻으로 쓰입니다.</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
    </defs>
</svg>
