<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#ef4444" text-anchor="middle">🔥 오버플로우 (Overflow): 한계 초과!</text>

    <!-- Memory Box Representation -->
    <g transform="translate(100, 80)">
        <rect width="600" height="180" rx="15" fill="#1e293b" />
        <text x="300" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" font-weight="bold">컴퓨터 메모리 (byte 타입: 8비트 한계)</text>
        
        <!-- The Dial Gauge / Meter -->
        <path d="M 150 150 A 150 150 0 0 1 450 150" fill="none" stroke="#334155" stroke-width="20" stroke-linecap="round"/>
        <path d="M 150 150 A 150 150 0 0 1 450 150" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round"/>
        
        <!-- Value Labels -->
        <text x="130" y="155" font-family="monospace" font-size="18" fill="#f87171" text-anchor="end" font-weight="bold">-128 (최소)</text>
        <text x="300" y="65" font-family="monospace" font-size="18" fill="#cbd5e1" text-anchor="middle" font-weight="bold">0</text>
        <text x="470" y="155" font-family="monospace" font-size="18" fill="#4ade80" text-anchor="start" font-weight="bold">+127 (최대)</text>
        
        <!-- Animated Needle -->
        <g>
            <!-- Needle center is at 300, 150. Max angle is +90deg (127), Min is -90deg (-128) -->
            <line x1="300" y1="150" x2="300" y2="40" stroke="#f1f5f9" stroke-width="4" stroke-linecap="round" />
            <circle cx="300" cy="150" r="10" fill="#f1f5f9" />
            
            <animateTransform attributeName="transform" type="rotate" 
                values="45, 300, 150; 80, 300, 150; 90, 300, 150; -90, 300, 150; -90, 300, 150" 
                keyTimes="0; 0.4; 0.5; 0.51; 1" 
                dur="6s" repeatCount="indefinite" />
        </g>
        
        <!-- Digital Display inside memory block -->
        <rect x="240" y="130" width="120" height="40" rx="5" fill="#0f172a" stroke="#475569" stroke-width="2"/>
        <text x="300" y="157" font-family="monospace" font-size="24" fill="#38bdf8" text-anchor="middle" font-weight="bold">
            <tspan opacity="1"><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.4;0.41;1" dur="6s" repeatCount="indefinite" />64</tspan>
            <tspan opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.4;0.41;0.5;0.51;1" dur="6s" repeatCount="indefinite" />127</tspan>
            <!-- Boom! Wrap around -->
            <tspan opacity="0" fill="#ef4444"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.51;1" dur="6s" repeatCount="indefinite" />-128</tspan>
        </text>
    </g>

    <!-- Formula Text -->
    <g transform="translate(400, 300)">
        <text font-family="monospace" font-size="20" fill="#334155" text-anchor="middle" font-weight="bold">
            <tspan fill="#2563eb">127</tspan> + <tspan fill="#16a34a">1</tspan> = <tspan fill="#ef4444">-128</tspan> 🤯
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="6s" repeatCount="indefinite" />
        </text>
        <text font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" y="30" font-weight="bold">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.5;0.55;1" dur="6s" repeatCount="indefinite" />
            (최대값을 넘어가면 계기판이 한 바퀴 돌아 최소값이 됩니다!)
        </text>
    </g>

    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ef4444" />
            <stop offset="50%" stop-color="#eab308" />
            <stop offset="100%" stop-color="#22c55e" />
        </linearGradient>
    </defs>
</svg>
