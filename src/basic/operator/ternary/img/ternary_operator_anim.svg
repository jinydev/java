<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">삼항 연산자 (양자택일 표지판) 🪧</text>

    <text x="400" y="70" font-family="monospace" font-size="20" fill="#64748b" text-anchor="middle" font-weight="bold">
        char grade = <tspan fill="#3b82f6">(score >= 90)</tspan> <tspan fill="#eab308">?</tspan> <tspan fill="#22c55e">'A'</tspan> <tspan fill="#eab308">:</tspan> <tspan fill="#ef4444">'B'</tspan>;
    </text>

    <!-- Condition Block -->
    <g transform="translate(100, 160)">
        <polygon points="100,0 200,50 100,100 0,50" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3" />
        <text x="100" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#1e40af" font-weight="bold" text-anchor="middle">점수가 90점 이상?</text>
        <text x="100" y="70" font-family="monospace" font-size="20" fill="#1d4ed8" font-weight="bold" text-anchor="middle" opacity="0">
             <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.1;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite" />
             true
        </text>
        <text x="100" y="70" font-family="monospace" font-size="20" fill="#b91c1c" font-weight="bold" text-anchor="middle" opacity="0">
             <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.4;0.5;0.6;0.9;1" dur="6s" repeatCount="indefinite" />
             false
        </text>
    </g>

    <text x="320" y="210" font-family="monospace" font-size="40" fill="#eab308" font-weight="bold">?</text>

    <!-- Paths -->
    <path d="M 300 210 L 450 140" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="10,5">
         <animate attributeName="stroke-dashoffset" values="15;0" dur="1s" repeatCount="indefinite" />
         <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.1;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite" />
    </path>
    <path d="M 300 210 L 450 280" fill="none" stroke="#ef4444" stroke-width="4" stroke-dasharray="10,5">
         <animate attributeName="stroke-dashoffset" values="15;0" dur="1s" repeatCount="indefinite" />
         <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.4;0.5;0.6;0.9;1" dur="6s" repeatCount="indefinite" />
    </path>

    <!-- True Path (A) -->
    <g transform="translate(450, 110)">
        <rect width="180" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="3" />
        <text x="90" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#15803d" font-weight="bold" text-anchor="middle">참일 때: 'A'</text>
         <animate attributeName="opacity" values="0.3;1;1;0.3;0.3;0.3" keyTimes="0;0.1;0.4;0.5;0.9;1" dur="6s" repeatCount="indefinite" />
    </g>

    <text x="650" y="210" font-family="monospace" font-size="40" fill="#eab308" font-weight="bold">:</text>

    <!-- False Path (B) -->
    <g transform="translate(450, 250)">
        <rect width="180" height="60" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="90" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#b91c1c" font-weight="bold" text-anchor="middle">거짓일 때: 'B'</text>
         <animate attributeName="opacity" values="0.3;0.3;0.3;0.3;1;1" keyTimes="0;0.4;0.5;0.6;0.9;1" dur="6s" repeatCount="indefinite" />
    </g>

</svg>
