<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <rect width="800" height="400" fill="#f8fafc" rx="15" />
    <rect width="796" height="396" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">산술 연산 기계의 마법 ⚙️</text>

    <!-- Inputs -->
    <g transform="translate(50, 100)">
        <rect width="120" height="60" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
        <text x="60" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#0369a1" text-anchor="middle" font-weight="bold">입력값 A: 10</text>
        <path d="M 130 30 L 250 160" stroke="#94a3b8" stroke-width="4" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)">
            <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite"/>
        </path>
        
        <!-- Animated payload -->
        <circle cx="0" cy="0" r="10" fill="#0ea5e9">
            <animateMotion path="M 130 30 L 250 160" dur="2s" repeatCount="indefinite" />
        </circle>
    </g>
    
    <g transform="translate(50, 240)">
        <rect width="120" height="60" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
        <text x="60" y="36" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#0369a1" text-anchor="middle" font-weight="bold">입력값 B: 3</text>
        <path d="M 130 30 L 250 -40" stroke="#94a3b8" stroke-width="4" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)">
            <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite"/>
        </path>
        
        <!-- Animated payload -->
        <circle cx="0" cy="0" r="10" fill="#0ea5e9">
            <animateMotion path="M 130 30 L 250 -40" dur="2s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- The Machine -->
    <g transform="translate(300, 120)">
        <rect width="160" height="160" rx="20" fill="#fef3c7" stroke="#d97706" stroke-width="4" />
        <text x="80" y="70" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#92400e" text-anchor="middle" font-weight="bold">산술</text>
        <text x="80" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#92400e" text-anchor="middle" font-weight="bold">기계</text>
        
        <!-- Gears rotating -->
        <g transform="translate(50, 130) scale(0.6)">
            <path d="M0 -20 L5 -20 L8 -10 L15 -14 L20 -8 L14 0 L20 8 L15 14 L8 10 L5 20 L0 20 L-5 20 L-8 10 L-15 14 L-20 8 L-14 0 L-20 -8 L-15 -14 L-8 -10 L-5 -20 Z" fill="#94a3b8">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite" />
            </path>
        </g>
        <g transform="translate(110, 130) scale(0.6)">
            <path d="M0 -20 L5 -20 L8 -10 L15 -14 L20 -8 L14 0 L20 8 L15 14 L8 10 L5 20 L0 20 L-5 20 L-8 10 L-15 14 L-20 8 L-14 0 L-20 -8 L-15 -14 L-8 -10 L-5 -20 Z" fill="#64748b">
                <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="3s" repeatCount="indefinite" />
            </path>
        </g>
    </g>

    <!-- Output Pathways -->
    <g transform="translate(480, 200)">
        <!-- Plus -->
        <g transform="translate(0, -120)">
            <path d="M 0 0 L 100 0" stroke="#22c55e" stroke-width="3" fill="none" marker-end="url(#arrow-plus)" />
            <text x="40" y="-10" font-size="20" fill="#166534" font-weight="bold">+</text>
            <rect x="110" y="-20" width="150" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
            <text x="185" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#166534" text-anchor="middle" font-weight="bold">더하기: 13</text>
            <circle cx="0" cy="0" r="6" fill="#22c55e">
                <animateMotion path="M 0 0 L 100 0" dur="2s" begin="0.2s" repeatCount="indefinite" />
            </circle>
        </g>
        
        <!-- Minus -->
        <g transform="translate(0, -60)">
            <path d="M 0 0 L 100 0" stroke="#f97316" stroke-width="3" fill="none" marker-end="url(#arrow-minus)" />
            <text x="40" y="-10" font-size="20" fill="#c2410c" font-weight="bold">-</text>
            <rect x="110" y="-20" width="150" height="40" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2" />
            <text x="185" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#c2410c" text-anchor="middle" font-weight="bold">빼기: 7</text>
            <circle cx="0" cy="0" r="6" fill="#f97316">
                <animateMotion path="M 0 0 L 100 0" dur="2s" begin="0.4s" repeatCount="indefinite" />
            </circle>
        </g>
        
        <!-- Multiply -->
        <g transform="translate(0, 0)">
            <path d="M 0 0 L 100 0" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrow-mult)" />
            <text x="40" y="-10" font-size="20" fill="#5b21b6" font-weight="bold">*</text>
            <rect x="110" y="-20" width="150" height="40" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" />
            <text x="185" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#5b21b6" text-anchor="middle" font-weight="bold">곱하기: 30</text>
            <circle cx="0" cy="0" r="6" fill="#8b5cf6">
                <animateMotion path="M 0 0 L 100 0" dur="2s" begin="0.6s" repeatCount="indefinite" />
            </circle>
        </g>
        
        <!-- Divide -->
        <g transform="translate(0, 60)">
            <path d="M 0 0 L 100 0" stroke="#ec4899" stroke-width="3" fill="none" marker-end="url(#arrow-div)" />
            <text x="40" y="-10" font-size="20" fill="#be185d" font-weight="bold">/</text>
            <rect x="110" y="-20" width="150" height="40" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2" />
            <text x="185" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#be185d" text-anchor="middle" font-weight="bold">몫: 3</text>
            <circle cx="0" cy="0" r="6" fill="#ec4899">
                <animateMotion path="M 0 0 L 100 0" dur="2s" begin="0.8s" repeatCount="indefinite" />
            </circle>
        </g>
        
        <!-- Modulo -->
        <g transform="translate(0, 120)">
            <path d="M 0 0 L 100 0" stroke="#06b6d4" stroke-width="3" fill="none" marker-end="url(#arrow-mod)" />
            <text x="40" y="-10" font-size="20" fill="#0e7490" font-weight="bold">%</text>
            <rect x="110" y="-20" width="150" height="40" rx="8" fill="#cffafe" stroke="#06b6d4" stroke-width="2" />
            <text x="185" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#0e7490" text-anchor="middle" font-weight="bold">나머지: 1</text>
            <circle cx="0" cy="0" r="6" fill="#06b6d4">
                <animateMotion path="M 0 0 L 100 0" dur="2s" begin="1.0s" repeatCount="indefinite" />
            </circle>
        </g>
    </g>

    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
        <marker id="arrow-plus" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e" />
        </marker>
        <marker id="arrow-minus" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#f97316" />
        </marker>
        <marker id="arrow-mult" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6" />
        </marker>
        <marker id="arrow-div" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ec4899" />
        </marker>
        <marker id="arrow-mod" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4" />
        </marker>
    </defs>
</svg>
