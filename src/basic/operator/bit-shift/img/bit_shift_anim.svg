<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">비트 이동 (Shift) 👈👉</text>

    <!-- Left Shift (<<) Container -->
    <g transform="translate(100, 80)">
        <rect width="600" height="100" rx="10" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" />
        <text x="300" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#0369a1" text-anchor="middle" font-weight="bold">좌측 이동 (a &lt;&lt; 1) : 곱하기 2의 효과</text>
        
        <!-- The Bits Array (8 boxes) -->
        <g transform="translate(100, 45)">
            <rect x="0" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="50" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="100" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="150" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="200" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="250" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="300" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
            <rect x="350" y="0" width="40" height="40" rx="5" fill="#bae6fd" stroke="#38bdf8" />
        </g>
        
        <!-- Animated Digits Shifting Left -->
        <g transform="translate(100, 45)">
            <text x="20" y="26" font-family="monospace" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">
                 0
                 <animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,-30" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="70" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="120" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="170" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="220" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="270" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="320" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="370" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            
            <!-- Incoming 0 from the right -->
            <text x="420" y="26" font-family="monospace" font-size="20" fill="#22c55e" text-anchor="middle" font-weight="bold">
                 +0
                 <animateTransform attributeName="transform" type="translate" values="0,0; -50,0; -50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="3s" repeatCount="indefinite" />
            </text>
        </g>
    </g>

    <!-- Right Shift (>>) Container -->
    <g transform="translate(100, 200)">
        <rect width="600" height="100" rx="10" fill="#fef08a" stroke="#eab308" stroke-width="2" />
        <text x="300" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#a16207" text-anchor="middle" font-weight="bold">우측 이동 (a >> 1) : 나누기 2의 효과</text>
        
        <g transform="translate(100, 45)">
            <rect x="0" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="50" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="100" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="150" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="200" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="250" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="300" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
            <rect x="350" y="0" width="40" height="40" rx="5" fill="#fde047" stroke="#eab308" />
        </g>
        
        <!-- Animated Digits Shifting Right -->
        <g transform="translate(100, 45)">
            <!-- Incoming MSB Copy from the left -->
            <text x="-30" y="26" font-family="monospace" font-size="20" fill="#eab308" text-anchor="middle" font-weight="bold">
                 +1
                 <animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.2;1" dur="3s" repeatCount="indefinite" />
            </text>
            
            <text x="20" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="70" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="120" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="170" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="220" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="270" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 0<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <text x="320" y="26" font-family="monospace" font-size="20" fill="#0f172a" text-anchor="middle" font-weight="bold">
                 1<animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
            <!-- Outgoing bit to the right -->
            <text x="370" y="26" font-family="monospace" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">
                 0
                 <animateTransform attributeName="transform" type="translate" values="0,0; 50,0; 50,20" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.5;1" dur="3s" repeatCount="indefinite" />
            </text>
        </g>
    </g>
</svg>
