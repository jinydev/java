<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#1e293b" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#334155" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" text-anchor="middle">비트 단위 세계의 전기 회로 🔌</text>

    <!-- AND Gate -->
    <g transform="translate(50, 80)">
        <rect width="200" height="220" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="2" />
        <text x="100" y="30" font-family="monospace" font-size="20" fill="#4ade80" text-anchor="middle" font-weight="bold">AND (&amp;)</text>
        <text x="100" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">모두 1이어야 1</text>
        
        <g transform="translate(10, 80)">
             <text x="40" y="25" fill="#f8fafc" font-family="monospace" font-size="24">1</text>
             <text x="40" y="65" fill="#f8fafc" font-family="monospace" font-size="24">1</text>
             <line x1="60" y1="20" x2="80" y2="20" stroke="#4ade80" stroke-width="3" />
             <line x1="60" y1="60" x2="80" y2="60" stroke="#4ade80" stroke-width="3" />
             
             <!-- AND Gate Shape -->
             <path d="M 80 0 L 100 0 A 40 40 0 0 1 100 80 L 80 80 Z" fill="#22c55e" />
             
             <line x1="120" y1="40" x2="150" y2="40" stroke="#4ade80" stroke-width="3" />
             <circle cx="160" cy="40" r="10" fill="#fef08a" />
             <text x="160" y="45" font-family="monospace" font-size="14" fill="#ca8a04" text-anchor="middle" font-weight="bold">1</text>
        </g>
        <rect width="200" height="220" rx="10" fill="#22c55e" opacity="0">
             <animate attributeName="opacity" values="0;0.1;0" dur="3s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- OR Gate -->
    <g transform="translate(300, 80)">
        <rect width="200" height="220" rx="10" fill="#0f172a" stroke="#38bdf8" stroke-width="2" />
        <text x="100" y="30" font-family="monospace" font-size="20" fill="#7dd3fc" text-anchor="middle" font-weight="bold">OR (|)</text>
        <text x="100" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">하나라도 1이면 1</text>

        <g transform="translate(10, 80)">
             <text x="40" y="25" fill="#f8fafc" font-family="monospace" font-size="24">0</text>
             <text x="40" y="65" fill="#f8fafc" font-family="monospace" font-size="24">1</text>
             <line x1="60" y1="20" x2="80" y2="20" stroke="#475569" stroke-width="3" />
             <line x1="60" y1="60" x2="80" y2="60" stroke="#38bdf8" stroke-width="3" />
             
             <!-- OR Gate Shape -->
             <path d="M 80 0 Q 100 40 80 80 Q 120 80 140 40 Q 120 0 80 0 Z" fill="#0ea5e9" />
             
             <line x1="140" y1="40" x2="160" y2="40" stroke="#38bdf8" stroke-width="3" />
             <circle cx="170" cy="40" r="10" fill="#fef08a" />
             <text x="170" y="45" font-family="monospace" font-size="14" fill="#ca8a04" text-anchor="middle" font-weight="bold">1</text>
        </g>
        
        <rect width="200" height="220" rx="10" fill="#38bdf8" opacity="0">
             <animate attributeName="opacity" values="0;0;0.1;0" dur="3s" begin="1s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- XOR Gate -->
    <g transform="translate(550, 80)">
        <rect width="200" height="220" rx="10" fill="#0f172a" stroke="#f43f5e" stroke-width="2" />
        <text x="100" y="30" font-family="monospace" font-size="20" fill="#fb7185" text-anchor="middle" font-weight="bold">XOR (^)</text>
        <text x="100" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">서로 달라야 1</text>
        
        <g transform="translate(10, 80)">
             <text x="40" y="25" fill="#f8fafc" font-family="monospace" font-size="24">1</text>
             <text x="40" y="65" fill="#f8fafc" font-family="monospace" font-size="24">0</text>
             <line x1="60" y1="20" x2="80" y2="20" stroke="#f43f5e" stroke-width="3" />
             <line x1="60" y1="60" x2="80" y2="60" stroke="#475569" stroke-width="3" />
             
             <!-- XOR Gate Shape -->
             <path d="M 75 0 Q 95 40 75 80" fill="none" stroke="#e11d48" stroke-width="3" />
             <path d="M 85 0 Q 105 40 85 80 Q 125 80 145 40 Q 125 0 85 0 Z" fill="#e11d48" />
             
             <line x1="145" y1="40" x2="160" y2="40" stroke="#f43f5e" stroke-width="3" />
             <circle cx="170" cy="40" r="10" fill="#fef08a" />
             <text x="170" y="45" font-family="monospace" font-size="14" fill="#ca8a04" text-anchor="middle" font-weight="bold">1</text>
        </g>
        
        <rect width="200" height="220" rx="10" fill="#f43f5e" opacity="0">
             <animate attributeName="opacity" values="0;0;0;0.1;0" dur="3s" begin="2s" repeatCount="indefinite" />
        </rect>
    </g>

</svg>
