<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">디지털 논리 회로 기호 파헤치기 🔌</text>

    <!-- 1. AND Gate Symbol -->
    <g transform="translate(50, 80)">
        <rect width="220" height="230" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
        <text x="110" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#0369a1" font-weight="bold" text-anchor="middle">AND 게이트 (&&)</text>
        
        <g transform="translate(45, 60)">
            <!-- D-Shape -->
            <path d="M 30 10 L 60 10 A 40 40 0 0 1 60 90 L 30 90 Z" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" />
            <!-- Inputs -->
            <line x1="10" y1="30" x2="30" y2="30" stroke="#0f172a" stroke-width="3" />
            <line x1="10" y1="70" x2="30" y2="70" stroke="#0f172a" stroke-width="3" />
            <text x="0" y="35" font-family="monospace" font-size="14" font-weight="bold">A</text>
            <text x="0" y="75" font-family="monospace" font-size="14" font-weight="bold">B</text>
            <!-- Output -->
            <line x1="100" y1="50" x2="130" y2="50" stroke="#0f172a" stroke-width="3" />
            <text x="135" y="55" font-family="monospace" font-size="14" font-weight="bold">결과</text>
        </g>
        
        <text x="110" y="190" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" text-anchor="middle">
            <tspan x="110" dy="0">D자 모양의 문지기!</tspan>
            <tspan x="110" dy="20">A, B 입력이 모두 '1(True)'</tspan>
            <tspan x="110" dy="20">일 때만 '1'을 출력합니다.</tspan>
        </text>
    </g>

    <!-- 2. OR Gate Symbol -->
    <g transform="translate(290, 80)">
        <rect width="220" height="230" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
        <text x="110" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#a16207" font-weight="bold" text-anchor="middle">OR 게이트 (||)</text>
        
        <g transform="translate(45, 60)">
            <!-- Curved Shape -->
            <path d="M 30 10 Q 50 10 70 50 Q 50 90 30 90 Q 45 50 30 10 Z" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <!-- Inputs -->
            <line x1="10" y1="30" x2="35" y2="30" stroke="#0f172a" stroke-width="3" />
            <line x1="10" y1="70" x2="35" y2="70" stroke="#0f172a" stroke-width="3" />
            <text x="0" y="35" font-family="monospace" font-size="14" font-weight="bold">A</text>
            <text x="0" y="75" font-family="monospace" font-size="14" font-weight="bold">B</text>
            <!-- Output -->
            <line x1="70" y1="50" x2="130" y2="50" stroke="#0f172a" stroke-width="3" />
            <text x="135" y="55" font-family="monospace" font-size="14" font-weight="bold">결과</text>
        </g>
        
        <text x="110" y="190" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" text-anchor="middle">
            <tspan x="110" dy="0">날렵한 화살촉 모양!</tspan>
            <tspan x="110" dy="20">A, B 중 하나라도 '1(True)'</tspan>
            <tspan x="110" dy="20">이면 '1'을 뿜어냅니다.</tspan>
        </text>
    </g>

    <!-- 3. NOT Gate Symbol -->
    <g transform="translate(530, 80)">
        <rect width="220" height="230" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
        <text x="110" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#be185d" font-weight="bold" text-anchor="middle">NOT 게이트 (!)</text>
        
        <g transform="translate(55, 60)">
            <!-- Triangle with Circle -->
            <path d="M 30 20 L 70 50 L 30 80 Z" fill="#fbcfe8" stroke="#db2777" stroke-width="3" />
            <circle cx="75" cy="50" r="5" fill="#fdf2f8" stroke="#db2777" stroke-width="3" />
            <!-- Input -->
            <line x1="0" y1="50" x2="30" y2="50" stroke="#0f172a" stroke-width="3" />
            <text x="-15" y="55" font-family="monospace" font-size="14" font-weight="bold">A</text>
            <!-- Output -->
            <line x1="80" y1="50" x2="120" y2="50" stroke="#0f172a" stroke-width="3" />
            <text x="125" y="55" font-family="monospace" font-size="14" font-weight="bold">결과</text>
        </g>
        
        <text x="110" y="190" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" text-anchor="middle">
            <tspan x="110" dy="0">세모에 동그라미(낫볼)!</tspan>
            <tspan x="110" dy="20">입력된 신호를 완전</tspan>
            <tspan x="110" dy="20">반대로 뒤집어(1⇄0) 냅니다.</tspan>
        </text>
    </g>

</svg>
