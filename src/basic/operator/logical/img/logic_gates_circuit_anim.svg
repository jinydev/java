<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">논리 회로 (전기 스위치) 로 이해하는 논리 연산자 💡</text>

    <!-- 1. AND Gate (Series Circuit) -->
    <g transform="translate(50, 80)">
        <rect width="700" height="120" rx="15" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
        <text x="50" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#0369a1" font-weight="bold">1. AND 연산자 (&&)</text>
        <text x="50" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#0c4a6e" font-weight="bold">직렬 회로: 둘 다 켜져야(true/닫힘) 불이 들어옴</text>
        
        <g transform="translate(150, 70)">
            <!-- Wires -->
            <path d="M 0 20 L 50 20 M 110 20 L 170 20 M 230 20 L 300 20" fill="none" stroke="#64748b" stroke-width="4" />
            
            <!-- Switch A (Flicking) -->
            <path d="M 50 20 L 110 0" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round">
                <animate attributeName="d" values="M 50 20 L 110 0; M 50 20 L 110 20; M 50 20 L 110 20; M 50 20 L 110 0" keyTimes="0;0.2;0.8;1" dur="6s" repeatCount="indefinite" />
                <animate attributeName="stroke" values="#dc2626;#16a34a;#16a34a;#dc2626" keyTimes="0;0.2;0.8;1" dur="6s" repeatCount="indefinite" />
            </path>
            <text x="80" y="-10" font-family="monospace" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold">스위치 A</text>

            <!-- Switch B (Flicking) -->
            <path d="M 170 20 L 230 0" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round">
                <animate attributeName="d" values="M 170 20 L 230 0; M 170 20 L 230 0; M 170 20 L 230 20; M 170 20 L 230 0" keyTimes="0;0.4;0.6;1" dur="6s" repeatCount="indefinite" />
                <animate attributeName="stroke" values="#dc2626;#dc2626;#16a34a;#dc2626" keyTimes="0;0.4;0.6;1" dur="6s" repeatCount="indefinite" />
            </path>
            <text x="200" y="-10" font-family="monospace" font-size="16" fill="#0f172a" text-anchor="middle" font-weight="bold">스위치 B</text>

            <!-- Light Bulb (AND) -->
            <circle cx="320" cy="20" r="20" fill="#cbd5e1" stroke="#94a3b8" stroke-width="3">
                 <!-- Both switches are closed only between 0.6 and 0.8 -->
                 <animate attributeName="fill" values="#cbd5e1;#cbd5e1;#fde047;#cbd5e1" keyTimes="0;0.59;0.6;1" dur="6s" repeatCount="indefinite" />
                 <animate attributeName="stroke" values="#94a3b8;#94a3b8;#ca8a04;#94a3b8" keyTimes="0;0.59;0.6;1" dur="6s" repeatCount="indefinite" />
            </circle>
            
            <text x="320" y="25" font-family="monospace" font-size="14" fill="#64748b" text-anchor="middle" font-weight="bold">
                 <animate attributeName="opacity" values="1;1;0;1" keyTimes="0;0.59;0.6;1" dur="6s" repeatCount="indefinite" />
                 OFF
            </text>
            <text x="320" y="25" font-family="monospace" font-size="14" fill="#854d0e" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.59;0.6;1" dur="6s" repeatCount="indefinite" />
                 ON
            </text>
        </g>
    </g>

    <!-- 2. OR Gate (Parallel Circuit) -->
    <g transform="translate(50, 220)">
        <rect width="700" height="130" rx="15" fill="#fef08a" stroke="#eab308" stroke-width="3" />
        <text x="50" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a16207" font-weight="bold">2. OR 연산자 (||)</text>
        <text x="50" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#713f12" font-weight="bold">병렬 회로: 둘 중 하나라도 켜지면(true/닫힘) 불이 들어옴</text>
        
        <g transform="translate(150, 60)">
            <!-- Left Split Wires -->
            <path d="M 0 30 L 40 30 M 40 0 L 40 60 L 80 60 M 40 0 L 80 0" fill="none" stroke="#64748b" stroke-width="4" />
            
            <!-- Switch A (Top) -->
            <path d="M 80 0 L 140 -20" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round">
                <animate attributeName="d" values="M 80 0 L 140 -20; M 80 0 L 140 0; M 80 0 L 140 0; M 80 0 L 140 -20" keyTimes="0;0.2;0.8;1" dur="6s" repeatCount="indefinite" />
                <animate attributeName="stroke" values="#dc2626;#16a34a;#16a34a;#dc2626" keyTimes="0;0.2;0.8;1" dur="6s" repeatCount="indefinite" />
            </path>
            <text x="110" y="-15" font-family="monospace" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">스위치 A</text>

            <!-- Switch B (Bottom) -->
            <path d="M 80 60 L 140 40" fill="none" stroke="#dc2626" stroke-width="6" stroke-linecap="round">
                <animate attributeName="d" values="M 80 60 L 140 40; M 80 60 L 140 40; M 80 60 L 140 60; M 80 60 L 140 40" keyTimes="0;0.4;0.9;1" dur="6s" repeatCount="indefinite" />
                <animate attributeName="stroke" values="#dc2626;#dc2626;#16a34a;#dc2626" keyTimes="0;0.4;0.9;1" dur="6s" repeatCount="indefinite" />
            </path>
            <text x="110" y="85" font-family="monospace" font-size="14" fill="#0f172a" text-anchor="middle" font-weight="bold">스위치 B</text>

            <!-- Right Merge Wires -->
            <path d="M 140 0 L 180 0 L 180 60 M 140 60 L 180 60 M 180 30 L 260 30" fill="none" stroke="#64748b" stroke-width="4" />

            <!-- Light Bulb (OR) -->
            <circle cx="280" cy="30" r="20" fill="#cbd5e1" stroke="#94a3b8" stroke-width="3">
                 <!-- At least one switch closed between 0.2 and 0.9 -->
                 <animate attributeName="fill" values="#cbd5e1;#cbd5e1;#fde047;#fde047;#cbd5e1" keyTimes="0;0.19;0.2;0.9;1" dur="6s" repeatCount="indefinite" />
                 <animate attributeName="stroke" values="#94a3b8;#94a3b8;#ca8a04;#ca8a04;#94a3b8" keyTimes="0;0.19;0.2;0.9;1" dur="6s" repeatCount="indefinite" />
            </circle>
            
            <text x="280" y="35" font-family="monospace" font-size="14" fill="#64748b" text-anchor="middle" font-weight="bold">
                 <animate attributeName="opacity" values="1;0;0;0;1" keyTimes="0;0.19;0.2;0.9;1" dur="6s" repeatCount="indefinite" />
                 OFF
            </text>
            <text x="280" y="35" font-family="monospace" font-size="14" fill="#854d0e" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.19;0.2;0.9;1" dur="6s" repeatCount="indefinite" />
                 ON
            </text>
        </g>
    </g>

    <!-- 3. NOT Gate (Inverter Circuit) -->
    <g transform="translate(50, 370)">
        <rect width="700" height="110" rx="15" fill="#fce7f3" stroke="#db2777" stroke-width="3" />
        <text x="50" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#9d174d" font-weight="bold">3. NOT 연산자 (!)</text>
        <text x="50" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#831843" font-weight="bold">인버터 (청개구리): 스위치가 꺼지면(false) 오히려 불이 들어옴</text>
        
        <g transform="translate(150, 60)">
            <path d="M 0 20 L 80 20 M 140 20 L 220 20" fill="none" stroke="#64748b" stroke-width="4" />
            
            <!-- Inverter Box Representing NOT Logic -->
            <polygon points="80,0 130,20 80,40" fill="#f472b6" stroke="#db2777" stroke-width="2" />
            <circle cx="135" cy="20" r="5" fill="#fdf2f8" stroke="#db2777" stroke-width="2" />

            <!-- Input Signal Animation -->
            <text x="40" y="10" font-family="monospace" font-size="16" fill="#1d4ed8" text-anchor="middle" font-weight="bold">
                 <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
                 ON
            </text>
            <text x="40" y="10" font-family="monospace" font-size="16" fill="#64748b" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
                 OFF
            </text>

            <!-- Light Bulb (NOT) - On when input is OFF -->
            <circle cx="240" cy="20" r="20" fill="#fde047" stroke="#ca8a04" stroke-width="3">
                 <animate attributeName="fill" values="#cbd5e1;#fde047;#cbd5e1" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
                 <animate attributeName="stroke" values="#94a3b8;#ca8a04;#94a3b8" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
            </circle>
            
            <text x="240" y="25" font-family="monospace" font-size="14" fill="#64748b" text-anchor="middle" font-weight="bold">
                 <animate attributeName="opacity" values="1;0;1" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
                 OFF
            </text>
            <text x="240" y="25" font-family="monospace" font-size="14" fill="#854d0e" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite" />
                 ON
            </text>
        </g>
    </g>

</svg>
