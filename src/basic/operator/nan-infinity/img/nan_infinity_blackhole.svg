<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">0으로 나누기의 위험성: 블랙홀 연산 🕳️</text>

    <!-- Infinity Example -->
    <g transform="translate(100, 80)">
        <rect width="250" height="220" rx="15" fill="#fef08a" stroke="#eab308" stroke-width="3" />
        <text x="125" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a16207" text-anchor="middle" font-weight="bold">Infinity (무한대)</text>
        
        <text x="125" y="80" font-family="monospace" font-size="24" fill="#854d0e" text-anchor="middle" font-weight="bold">
            5.0 / 0.0
        </text>
        
        <!-- Expanding circle animation -->
        <g transform="translate(125, 150)">
            <circle cx="0" cy="0" r="10" fill="#fde047" stroke="#ca8a04" stroke-width="2">
                <animate attributeName="r" values="10; 40; 10" dur="3s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1; 0; 1" dur="3s" repeatCount="indefinite" />
            </circle>
            <circle cx="0" cy="0" r="20" fill="none" stroke="#ca8a04" stroke-width="2">
                <animate attributeName="r" values="20; 60; 20" dur="3s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1; 0; 1" dur="3s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="8" font-family="monospace" font-size="28" fill="#ca8a04" text-anchor="middle" font-weight="bold">∞</text>
        </g>
        
        <text x="125" y="210" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" text-anchor="middle" font-weight="bold">끝없이 커지는 값</text>
    </g>

    <!-- NaN Example -->
    <g transform="translate(450, 80)">
        <rect width="250" height="220" rx="15" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="125" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#b91c1c" text-anchor="middle" font-weight="bold">NaN (숫자가 아님)</text>
        
        <text x="125" y="80" font-family="monospace" font-size="24" fill="#991b1b" text-anchor="middle" font-weight="bold">
            5.0 % 0.0
        </text>
        
        <!-- BlackHole / Corruption animation -->
        <g transform="translate(125, 150)">
            <!-- Swirling corrupted data -->
            <path d="M -30 -20 Q 0 -40 30 -20 T 30 20 T -30 20 Z" fill="#fca5a5" stroke="#ef4444" stroke-width="2">
                 <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="4s" repeatCount="indefinite" />
            </path>
            
            <text x="0" y="6" font-family="monospace" font-size="20" fill="#991b1b" text-anchor="middle" font-weight="bold" letter-spacing="2">
                NaN
                <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite" />
            </text>
            
            <!-- Contagious property shown as particles -->
            <circle cx="40" cy="-30" r="4" fill="#b91c1c">
                <animateTransform attributeName="transform" type="translate" values="0,0; 20,-20; 0,0" dur="2s" repeatCount="indefinite" />
            </circle>
            <circle cx="-40" cy="30" r="4" fill="#b91c1c">
                <animateTransform attributeName="transform" type="translate" values="0,0; -20,20; 0,0" dur="2s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="55" font-family="monospace" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">NaN + 2 = NaN</text>
        </g>
        
        <text x="125" y="210" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" text-anchor="middle" font-weight="bold">연산할수록 오류가 퍼짐 (전염성)</text>
    </g>

    <!-- vs Symbol -->
    <text x="400" y="190" font-family="monospace" font-size="40" fill="#94a3b8" text-anchor="middle" font-weight="bold">⚠️</text>

</svg>
