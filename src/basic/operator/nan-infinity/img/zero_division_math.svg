<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <rect width="800" height="400" fill="#f8fafc" rx="15" />
    <rect width="796" height="396" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">왜 0으로 나누면 에러이거나 무한대일까? 🤔</text>

    <!-- Integer Division (Crash) Box -->
    <g transform="translate(100, 80)">
        <rect width="250" height="250" rx="15" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="125" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#b91c1c" text-anchor="middle" font-weight="bold">정수 연산 (int)</text>
        <text x="125" y="70" font-family="monospace" font-size="18" fill="#7f1d1d" text-anchor="middle" font-weight="bold">5 / 0</text>
        
        <g transform="translate(75, 100)">
            <rect x="0" y="0" width="100" height="50" rx="5" fill="#fca5a5" />
            <text x="50" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#7f1d1d" text-anchor="middle" font-weight="bold">CPU 계산기</text>
            
            <!-- Lightning / Crash animation -->
            <path d="M 50 -20 L 40 10 L 60 5 L 50 30" fill="none" stroke="#ef4444" stroke-width="4">
                <animate attributeName="opacity" values="0;1;1;0;0;0" keyTimes="0;0.5;0.6;0.7;0.8;1" dur="2s" repeatCount="indefinite" />
            </path>
            
            <circle cx="50" cy="25" r="2" fill="#ef4444">
                <animate attributeName="r" values="2;40" dur="2s" begin="1s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite" />
            </circle>
        </g>
        
        <text x="125" y="200" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" text-anchor="middle" font-weight="bold">답을 낼 수 없어 "폭발 (예외)"</text>
        <text x="125" y="220" font-family="monospace" font-size="14" fill="#991b1b" text-anchor="middle" font-weight="bold">ArithmeticException</text>
    </g>

    <text x="400" y="210" font-family="monospace" font-size="40" fill="#94a3b8" text-anchor="middle" font-weight="bold">🆚</text>

    <!-- Float Division (Infinity limits) Box -->
    <g transform="translate(450, 80)">
        <rect width="250" height="250" rx="15" fill="#fef08a" stroke="#eab308" stroke-width="3" />
        <text x="125" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a16207" text-anchor="middle" font-weight="bold">실수 연산 (double)</text>
        <text x="125" y="70" font-family="monospace" font-size="18" fill="#854d0e" text-anchor="middle" font-weight="bold">5.0 / 0.0</text>
        
        <!-- Math Limit Animation -->
        <g transform="translate(125, 120)">
            <text x="0" y="0" font-family="monospace" font-size="16" fill="#854d0e" text-anchor="middle" font-weight="bold">
                <tspan x="0" dy="0">5 / 0.1 = 50</tspan>
                <tspan x="0" dy="25">5 / 0.01 = 500</tspan>
                <tspan x="0" dy="25">5 / 0.001 = 5000</tspan>
                <tspan x="0" dy="25" fill="#ca8a04">5 / 0.00... = ∞</tspan>
            </text>
            
            <!-- Arrow pointing down -->
            <path d="M -80 0 L -80 60" fill="none" stroke="#eab308" stroke-width="3" marker-end="url(#arrowy)" />
        </g>
        
        <text x="125" y="210" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" text-anchor="middle" font-weight="bold">규칙(IEEE 754)상 에러가 안나고</text>
        <text x="125" y="230" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" text-anchor="middle" font-weight="bold">"Infinity" 값을 반환함</text>
    </g>

    <defs>
        <marker id="arrowy" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
            <polygon points="0 0, 10 0, 5 7" fill="#eab308" />
        </marker>
    </defs>
</svg>
