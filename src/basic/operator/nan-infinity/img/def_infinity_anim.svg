<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">Infinity (무한대) 란 무엇인가요? 🚀</text>

    <!-- The Definition -->
    <g transform="translate(100, 80)">
        <rect width="600" height="220" rx="15" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="3" />
        
        <text x="50" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#0369a1" font-weight="bold">정의:</text>
        <text x="110" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#0f172a" font-weight="bold">컴퓨터가 표현할 수 있는 최대 한계치를 넘어서버린 거대한 숫자</text>
        
        <text x="50" y="70" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#0369a1" font-weight="bold">조건:</text>
        <text x="110" y="70" font-family="monospace" font-size="18" fill="#ef4444" font-weight="bold">실수 (예: 5.0) 를 0.0 으로 나눌 때 발생</text>

        <!-- Visualizing Growth -->
        <g transform="translate(300, 150)">
            <text x="0" y="-30" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#64748b" text-anchor="middle" font-weight="bold">계산기 메모리 상자</text>
            
            <rect x="-150" y="-10" width="300" height="60" rx="10" fill="#bae6fd" stroke="#0284c7" stroke-width="2" />
            
            <!-- Value growing and breaking out -->
            <text x="0" y="30" font-family="monospace" font-size="32" fill="#0369a1" text-anchor="middle" font-weight="bold">
                <animate attributeName="font-size" values="24;48;72;96;24" keyTimes="0;0.5;0.7;0.9;1" dur="4s" repeatCount="indefinite" />
                <animate attributeName="fill" values="#0369a1;#b91c1c;#b91c1c;#b91c1c;#0369a1" keyTimes="0;0.5;0.7;0.9;1" dur="4s" repeatCount="indefinite" />
                <tspan>
                    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.7;0.8;0.9;1" dur="4s" repeatCount="indefinite" />
                    99...
                </tspan>
                <tspan x="0" y="30" opacity="0">
                     <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.8;0.9;1" dur="4s" repeatCount="indefinite" />
                     ∞
                </tspan>
            </text>
            
            <!-- Container breaking effect -->
            <path d="M -150 -10 L -180 -30 M -150 50 L -180 70 M 150 -10 L 180 -30 M 150 50 L 180 70" fill="none" stroke="#ef4444" stroke-width="4" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.8;0.9;1" dur="4s" repeatCount="indefinite" />
            </path>
            
            <text x="0" y="80" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#ef4444" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.8;0.9;1" dur="4s" repeatCount="indefinite" />
                 "메모리를 뚫고 나갈 만큼 너무 큼!"
            </text>
        </g>
    </g>

</svg>
