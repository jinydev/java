<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">NaN (Not a Number) 이란 무엇인가요? 🤷‍♂️</text>

    <!-- The Definition -->
    <g transform="translate(100, 80)">
        <rect width="600" height="220" rx="15" fill="#fef08a" stroke="#eab308" stroke-width="3" />
        
        <text x="50" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a16207" font-weight="bold">정의:</text>
        <text x="110" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#0f172a" font-weight="bold">해석 불가능한 잘못된 수학 연산으로 인해 "숫자가 아니다" 라고 판별된 값</text>
        
        <text x="50" y="70" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#a16207" font-weight="bold">조건:</text>
        <text x="110" y="70" font-family="monospace" font-size="18" fill="#ef4444" font-weight="bold">실수를 0.0 으로 % (나머지 구하기) 연산 등을 할 때 발생</text>

        <!-- Visualizing the Error -->
        <g transform="translate(300, 150)">
            <text x="-150" y="20" font-family="monospace" font-size="32" fill="#0f172a" font-weight="bold">5.0 % 0.0</text>
            
            <path d="M 40 10 L 100 10" fill="none" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrowy)" />
            
            <!-- Computer confused -->
            <g transform="translate(160, 0)">
                <rect x="-40" y="-30" width="80" height="60" rx="10" fill="#cbd5e1" stroke="#475569" stroke-width="2" />
                <rect x="-30" y="-20" width="60" height="35" rx="5" fill="#0f172a" />
                <path d="M -15 25 L 15 25" stroke="#475569" stroke-width="4" />
                
                <!-- Confused face -->
                <text x="0" y="5" font-family="monospace" font-size="20" fill="#f8fafc" text-anchor="middle" font-weight="bold">
                    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.4;0.9;1" dur="4s" repeatCount="indefinite" />
                    ^_^
                </text>
                
                <text x="0" y="5" font-family="monospace" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold" opacity="0">
                    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.4;0.9;1" dur="4s" repeatCount="indefinite" />
                    NaN
                </text>
            </g>
            
            <text x="160" y="70" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" text-anchor="middle" font-weight="bold" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.4;0.9;1" dur="4s" repeatCount="indefinite" />
                 "계산 불가능한 오류값!"
            </text>
            
            <!-- Question marks popping up -->
            <g opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.4;0.9;1" dur="4s" repeatCount="indefinite" />
                 <text x="120" y="-40" font-family="monospace" font-size="24" fill="#eab308" font-weight="bold">?</text>
                 <text x="180" y="-50" font-family="monospace" font-size="20" fill="#ef4444" font-weight="bold">?</text>
                 <text x="160" y="-30" font-family="monospace" font-size="28" fill="#a16207" font-weight="bold">?</text>
            </g>
        </g>
    </g>

    <defs>
        <marker id="arrowy" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>

</svg>
