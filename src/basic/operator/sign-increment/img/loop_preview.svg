<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">증감 연산자와 반복문의 찰떡궁합 🔁</text>

    <!-- Loop Code Block -->
    <g transform="translate(50, 80)">
        <rect width="320" height="200" rx="10" fill="#1e293b" />
        <rect width="320" height="40" rx="10" fill="#334155" />
        <circle cx="20" cy="20" r="6" fill="#ef4444" />
        <circle cx="40" cy="20" r="6" fill="#f59e0b" />
        <circle cx="60" cy="20" r="6" fill="#10b981" />
        
        <text x="20" y="75" font-family="monospace" font-size="16" fill="#38bdf8" font-weight="bold">for <tspan fill="#e2e8f0">(int i = 0;</tspan> <tspan fill="#fde047">i &lt; 3;</tspan> <tspan fill="#a3e635">i++</tspan><tspan fill="#e2e8f0">)</tspan> <tspan fill="#e2e8f0">{</tspan></text>
        <text x="50" y="115" font-family="monospace" font-size="16" fill="#e2e8f0">System.out.print(i);</text>
        <text x="20" y="155" font-family="monospace" font-size="16" fill="#e2e8f0">}</text>
        
        <!-- Highlight box for i++ -->
        <rect x="235" y="55" width="45" height="25" fill="#a3e635" opacity="0" rx="5">
             <animate attributeName="opacity" values="0;0.4;0" keyTimes="0;0.8;1" dur="4s" repeatCount="indefinite" />
        </rect>
    </g>

    <!-- Visual Running Track -->
    <g transform="translate(430, 80)">
        <rect width="320" height="200" rx="15" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="3" />
        <text x="160" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" text-anchor="middle" font-weight="bold">트랙 달리기 (루프)</text>
        
        <!-- Tracks -->
        <rect x="20" y="50" width="280" height="40" rx="20" fill="#e2e8f0" />
        
        <!-- Runner (Variable i) -->
        <g>
            <circle cx="40" cy="70" r="15" fill="#a3e635" stroke="#4d7c0f" stroke-width="2" />
            <text x="40" y="75" font-family="monospace" font-size="14" fill="#14532d" text-anchor="middle" font-weight="bold">i</text>
            <animateTransform attributeName="transform" type="translate" 
                values="0,0; 80,0; 80,0; 160,0; 160,0; 240,0; 240,0; 0,0" 
                keyTimes="0; 0.2; 0.3; 0.5; 0.6; 0.8; 0.9; 1" 
                dur="4s" repeatCount="indefinite" />
        </g>
        
        <!-- i value display -->
        <text x="160" y="140" font-family="monospace" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="bold">현재 i = <tspan fill="#0ea5e9">0</tspan></text>
        
        <!-- Animated Number change -->
        <g>
            <text x="160" y="140" font-family="monospace" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="bold">현재 i = <tspan fill="#0ea5e9" opacity="0">0<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.2;0.3;1" dur="4s" repeatCount="indefinite" /></tspan></text>
            <text x="160" y="140" font-family="monospace" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="bold">현재 i = <tspan fill="#0ea5e9" opacity="0">1<animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.3;0.5;0.6;1" dur="4s" repeatCount="indefinite" /></tspan></text>
            <text x="160" y="140" font-family="monospace" font-size="24" fill="#0f172a" text-anchor="middle" font-weight="bold">현재 i = <tspan fill="#0ea5e9" opacity="0">2<animate attributeName="opacity" values="0;0;0;0;1;1;0;0" keyTimes="0;0.2;0.5;0.6;0.8;0.9;1;1" dur="4s" repeatCount="indefinite" /></tspan></text>
        </g>

        <!-- Condition check text -->
        <text x="160" y="170" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold" opacity="0">
            i++ 로 1 증가!
            <animate attributeName="opacity" values="0;1;0;1;0" keyTimes="0;0.2;0.3;0.5;0.6" dur="4s" repeatCount="indefinite" />
        </text>
    </g>
</svg>
