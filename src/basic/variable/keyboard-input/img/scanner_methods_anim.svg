<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;display=swap');
      
      .st-title { font-family: 'Noto Sans KR', sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .st-desc { font-family: 'Noto Sans KR', sans-serif; font-size: 16px; fill: #555; }
      
      .code-main { font-family: 'Fira Code', monospace; font-size: 20px; font-weight: bold; fill: #2c3e50; }
      
      .token-box { fill: #fdf2e9; stroke: #e67e22; stroke-width: 2; rx: 8; }
      .space-box { fill: #ecf0f1; rx: 4; }
      
      .val-text { font-family: 'Fira Code', monospace; font-size: 20px; font-weight: bold; fill: #d35400; }
      .space-text { font-family: 'Fira Code', monospace; font-size: 14px; fill: #bdc3c7; }
      
      /* Method Boxes */
      .method-box { fill: #ffffff; stroke-width: 3; rx: 8; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1)); }
      .method-text { font-family: 'Fira Code', monospace; font-size: 18px; font-weight: bold; }
      .method-desc { font-family: 'Noto Sans KR', sans-serif; font-size: 14px; fill: #7f8c8d; }
      
      .m-next { stroke: #3498db; }
      .t-next { fill: #3498db; }
      
      .m-int { stroke: #27ae60; }
      .t-int { fill: #27ae60; }
      
      .m-double { stroke: #9b59b6; }
      .t-double { fill: #9b59b6; }
      
      .m-boolean { stroke: #f39c12; }
      .t-boolean { fill: #f39c12; }

      /* Animations */
      @keyframes consume {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        20% { transform: translateY(-5px) scale(1.1); opacity: 1; }
        80% { transform: translateY(60px) scale(0.6); opacity: 0; }
        100% { opacity: 0; }
      }
      
      @keyframes popHighlight {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }

      .token-1 { animation: consume 4s infinite 1s; }
      .box-1 { animation: popHighlight 4s infinite 1s; }
      
      .token-2 { animation: consume 4s infinite 2s; }
      .box-2 { animation: popHighlight 4s infinite 2s; }
      
      .token-3 { animation: consume 4s infinite 3s; }
      .box-3 { animation: popHighlight 4s infinite 3s; }
      
      .token-4 { animation: consume 4s infinite 4s; }
      .box-4 { animation: popHighlight 4s infinite 4s; }

    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10" />
  
  <text x="400" y="40" text-anchor="middle" class="st-title">다양한 Scanner 메소드 입력 원리 📡</text>
  <text x="400" y="70" text-anchor="middle" class="st-desc">공백(스페이스, 탭, 엔터)을 기준으로 텍스트를 끊어서, 알맞은 타입으로 변환(Parsing)합니다.</text>

  <!-- Input Stream Bar -->
  <g transform="translate(60, 120)">
    <rect x="0" y="-10" width="680" height="70" fill="#f8f9fa" rx="10" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="8"/>
    <text x="-40" y="30" font-family="Noto Sans KR" font-size="16" font-weight="bold" fill="#7f8c8d" transform="rotate(-90, -40, 30)">System.in 입력 스트림</text>
    
    <!-- Token 1: String -->
    <g transform="translate(20, 5)">
      <rect x="0" y="0" width="100" height="40" class="token-box" />
      <text x="50" y="27" text-anchor="middle" class="val-text">"홍길동"</text>
      <!-- Consumption Animation -->
      <g class="token-1">
        <rect x="0" y="0" width="100" height="40" class="token-box" fill="#3498db" opacity="0.8" />
        <text x="50" y="27" text-anchor="middle" class="val-text" fill="white">"홍길동"</text>
      </g>
    </g>
    
    <rect x="130" y="15" width="30" height="20" class="space-box" />
    <text x="145" y="30" text-anchor="middle" class="space-text">공백</text>

    <!-- Token 2: int -->
    <g transform="translate(170, 5)">
      <rect x="0" y="0" width="80" height="40" class="token-box" />
      <text x="40" y="27" text-anchor="middle" class="val-text">25</text>
      <!-- Consumption Animation -->
      <g class="token-2">
        <rect x="0" y="0" width="80" height="40" class="token-box" fill="#27ae60" opacity="0.8" />
        <text x="40" y="27" text-anchor="middle" class="val-text" fill="white">25</text>
      </g>
    </g>

    <rect x="260" y="15" width="30" height="20" class="space-box" />
    <text x="275" y="30" text-anchor="middle" class="space-text">공백</text>

    <!-- Token 3: double -->
    <g transform="translate(300, 5)">
      <rect x="0" y="0" width="120" height="40" class="token-box" />
      <text x="60" y="27" text-anchor="middle" class="val-text">175.5</text>
      <!-- Consumption Animation -->
      <g class="token-3">
        <rect x="0" y="0" width="120" height="40" class="token-box" fill="#9b59b6" opacity="0.8" />
        <text x="60" y="27" text-anchor="middle" class="val-text" fill="white">175.5</text>
      </g>
    </g>

    <rect x="430" y="15" width="30" height="20" class="space-box" />
    <text x="445" y="30" text-anchor="middle" class="space-text">공백</text>

    <!-- Token 4: boolean -->
    <g transform="translate(470, 5)">
      <rect x="0" y="0" width="100" height="40" class="token-box" />
      <text x="50" y="27" text-anchor="middle" class="val-text">true</text>
      <!-- Consumption Animation -->
      <g class="token-4">
        <rect x="0" y="0" width="100" height="40" class="token-box" fill="#f39c12" opacity="0.8" />
        <text x="50" y="27" text-anchor="middle" class="val-text" fill="white">true</text>
      </g>
    </g>

    <rect x="580" y="15" width="30" height="20" class="space-box" />
    <text x="595" y="30" text-anchor="middle" class="space-text">엔터</text>
  </g>

  <!-- Methods (Receivers) -->
  <g transform="translate(80, 260)">
    
    <!-- next() -->
    <g transform="translate(0, 0)" class="box-1">
      <rect x="0" y="0" width="150" height="90" class="method-box m-next" />
      <path d="M 50 -20 L 50 -60" stroke="#3498db" stroke-width="3" stroke-dasharray="4" fill="none"/>
      <polygon points="45,-20 55,-20 50,-10" fill="#3498db" />
      <text x="75" y="40" text-anchor="middle" class="method-text t-next">.next()</text>
      <text x="75" y="65" text-anchor="middle" class="method-desc">문자열 (단어)</text>
      <text x="75" y="80" text-anchor="middle" class="method-desc" font-size="12">공백 전까지</text>
    </g>

    <!-- nextInt() -->
    <g transform="translate(170, 0)" class="box-2">
      <rect x="0" y="0" width="150" height="90" class="method-box m-int" />
      <path d="M 50 -20 L 50 -60" stroke="#27ae60" stroke-width="3" stroke-dasharray="4" fill="none"/>
      <polygon points="45,-20 55,-20 50,-10" fill="#27ae60" />
      <text x="75" y="40" text-anchor="middle" class="method-text t-int">.nextInt()</text>
      <text x="75" y="65" text-anchor="middle" class="method-desc">정수형 치환</text>
      <text x="75" y="80" text-anchor="middle" class="method-desc" font-size="12">문자열 ➜ int</text>
    </g>

    <!-- nextDouble() -->
    <g transform="translate(340, 0)" class="box-3">
      <rect x="0" y="0" width="150" height="90" class="method-box m-double" />
      <path d="M 50 -20 L 50 -60" stroke="#9b59b6" stroke-width="3" stroke-dasharray="4" fill="none"/>
      <polygon points="45,-20 55,-20 50,-10" fill="#9b59b6" />
      <text x="75" y="40" text-anchor="middle" class="method-text t-double">.nextDouble()</text>
      <text x="75" y="65" text-anchor="middle" class="method-desc">실수형 치환</text>
      <text x="75" y="80" text-anchor="middle" class="method-desc" font-size="12">문자열 ➜ double</text>
    </g>

    <!-- nextBoolean() -->
    <g transform="translate(510, 0)" class="box-4">
      <rect x="0" y="0" width="150" height="90" class="method-box m-boolean" />
      <path d="M 50 -20 L 50 -60" stroke="#f39c12" stroke-width="3" stroke-dasharray="4" fill="none"/>
      <polygon points="45,-20 55,-20 50,-10" fill="#f39c12" />
      <text x="75" y="40" text-anchor="middle" class="method-text t-boolean">.nextBoolean()</text>
      <text x="75" y="65" text-anchor="middle" class="method-desc">논리형 치환</text>
      <text x="75" y="80" text-anchor="middle" class="method-desc" font-size="12">"true" ➜ true</text>
    </g>
  </g>

  <rect x="0" y="0" width="800" height="450" fill="none" stroke="#e0e0e0" stroke-width="2" rx="10"/>
</svg>
