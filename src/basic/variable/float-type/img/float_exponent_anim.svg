<svg width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: 'Malgun Gothic', sans-serif; font-size: 22px; fill: #2f3542; font-weight: bold; }
      .desc { font-family: 'Malgun Gothic', sans-serif; font-size: 16px; fill: #747d8c; }
      .math { font-family: 'Courier New', monospace; font-size: 40px; font-weight: bold; }
      .mantissa { fill: #3742fa; }
      .exponent { fill: #ff4757; }
      .base { fill: #2f3542; }
      .annotation { font-family: 'Malgun Gothic', sans-serif; font-size: 16px; font-weight: bold; }
      
      @keyframes slideMantissa {
        0%, 100% { fill-opacity: 1; transform: scale(1); }
        50% { fill-opacity: 0.5; transform: scale(0.95); }
      }
      
      @keyframes growExponent {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.3) translateY(-5px); }
      }
      
      .anim-mantissa { animation: slideMantissa 4s infinite ease-in-out; transform-origin: center; }
      .anim-exponent { animation: growExponent 4s infinite ease-in-out; transform-origin: center; }
    </style>
  </defs>

  <rect width="100%" height="100%" rx="15" fill="#f1f2f6" stroke="#dfe4ea" stroke-width="4"/>
  
  <text x="50%" y="40" text-anchor="middle" class="title">부동 소수점의 비밀: 가수(Mantissa)와 지수(Exponent) 🔍</text>
  <text x="50%" y="70" text-anchor="middle" class="desc">정밀도(가수)를 조금 포기하는 대신, 거대한 크기(지수)를 표현합니다.</text>
  
  <g transform="translate(130, 150)">
    <!-- Mantissa -->
    <text x="0" y="0" class="math mantissa anim-mantissa">3.14</text>
    <text x="35" y="30" class="annotation mantissa" text-anchor="middle">가수 (정밀도)</text>
    
    <!-- Base -->
    <text x="110" y="0" class="math base">×</text>
    <text x="160" y="0" class="math base">10</text>
    
    <!-- Exponent -->
    <text x="220" y="-20" class="math exponent anim-exponent" font-size="30">8</text>
    <text x="230" y="30" class="annotation exponent" text-anchor="middle">지수 (크기 증폭!)</text>
  </g>
</svg>
