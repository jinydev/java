<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="550">
    <rect width="800" height="550" fill="#f8fafc" rx="15" />
    <rect width="796" height="546" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">중괄호 {} 블록과 다중 분기 (else-if) 흐름 🌊</text>

    <!-- Global Code Context -->
    <text x="50" y="80" font-family="monospace" font-size="18" fill="#1d4ed8" font-weight="bold">int score = <tspan fill="#ef4444">85</tspan>;</text>

    <!-- Pipeline Structure -->
    <g transform="translate(100, 110)">
        
        <!-- 1st Check (>= 90) -->
        <g transform="translate(0, 0)">
            <polygon points="100,0 200,20 100,40 0,20" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="100" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">if (score >= 90)</text>
            
            <text x="210" y="15" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True</text>
            <!-- True Box (Code Block) -->
            <rect x="250" y="0" width="220" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3" stroke-dasharray="5,5" />
            <text x="260" y="20" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">{ // 블록 시작</text>
            <text x="280" y="40" font-family="monospace" font-size="14" fill="#15803d">System.out.println("A");</text>
            <text x="260" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">} // 블록 끝</text>

            <text x="110" y="70" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False</text>
        </g>

        <!-- Vertical Path 1 -> 2 -->
        <path d="M 100 40 L 100 100" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 2nd Check (>= 80) -->
        <g transform="translate(0, 100)">
            <polygon points="100,0 200,20 100,40 0,20" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="100" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">else if (score >= 80)</text>
            
            <text x="210" y="15" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True</text>
            <!-- True Box -->
            <rect x="250" y="0" width="220" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3" stroke-dasharray="5,5" />
            <text x="260" y="20" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">{ // 들여쓰기 활약</text>
            <text x="280" y="40" font-family="monospace" font-size="14" fill="#15803d">System.out.println("B");</text>
            <text x="260" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">}</text>

             <text x="110" y="70" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False</text>
        </g>

        <!-- Vertical Path 2 -> 3 -->
        <path d="M 100 140 L 100 200" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 3rd Case (else) -->
        <g transform="translate(50, 200)">
            <rect width="100" height="40" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="50" y="25" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">else (나머지)</text>
            
            <!-- True Box -->
            <rect x="200" y="-10" width="220" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="3" stroke-dasharray="5,5" />
            <text x="210" y="10" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">{</text>
            <text x="230" y="30" font-family="monospace" font-size="14" fill="#15803d">System.out.println("C");</text>
            <text x="210" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#15803d" font-weight="bold">}</text>
        </g>
        
        <!-- Lines from True boxes jumping to END -->
        <path d="M 470 30 L 530 30 L 530 300" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="3,3" marker-end="url(#arrow-blue)" />
        <path d="M 470 130 L 530 130" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="3,3" />
        <path d="M 470 220 L 530 220" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="3,3" />

        <!-- End node -->
        <ellipse cx="530" cy="330" rx="50" ry="25" fill="#e2e8f0" stroke="#64748b" stroke-width="3" />
        <text x="530" y="335" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">조건문 종료</text>

        <!-- Tracing Data Animation (score = 85) -->
        <!-- 1. Start -> Check1 (False) -> Check2 (True) -> Block2 -> End -->
        <circle cx="100" cy="-30" r="12" fill="#ef4444">
            <animateMotion dur="5s" repeatCount="indefinite" path="M 0 10 L 0 50 L 0 120 L 160 120 L 370 120 L 430 120 L 430 330" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.75; 1" />
        </circle>
        <text x="100" y="-35" font-family="monospace" font-size="16" fill="#be123c" font-weight="bold">
            <animateMotion dur="5s" repeatCount="indefinite" path="M 0 10 L 0 50 L 0 120 L 160 120 L 370 120 L 430 120 L 430 330" keyTimes="0; 0.15; 0.3; 0.45; 0.6; 0.75; 1" />
            <tspan dx="-15" dy="-15">85</tspan>
        </text>
    </g>

    <text x="400" y="520" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#9f1239" font-weight="bold" text-anchor="middle">👆 애니메이션 설명: 하나라도 합격(True)하면, 블록 {} 을 실행한 뒤 아래 조건들은 쳐다보지도 않고 종료!</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
        </marker>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2563eb" />
        </marker>
    </defs>
</svg>
