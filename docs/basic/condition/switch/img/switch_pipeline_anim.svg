<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">상태 기반 분기 (Switch - Case) 알고리즘 🎛️</text>

    <!-- Global Code Context -->
    <text x="50" y="80" font-family="monospace" font-size="20" fill="#1d4ed8" font-weight="bold">int state = <tspan fill="#ef4444">2</tspan>;</text>

    <!-- Elevator/Vending Switch Board -->
    <g transform="translate(150, 180)">
        
        <!-- Main Switch Input -->
        <circle cx="0" cy="0" r="30" fill="#fef08a" stroke="#ca8a04" stroke-width="4" />
        <text x="0" y="5" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">switch</text>
        <text x="0" y="20" font-family="monospace" font-size="12" fill="#a16207" font-weight="bold" text-anchor="middle">(state)</text>

        <!-- Dispatcher Lines -->
        <path d="M 30 0 L 150 -80" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,3" />
        <path d="M 30 0 L 150 0" fill="none" stroke="#94a3b8" stroke-width="4" />
        <path d="M 30 0 L 150 80" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,3" />
        <path d="M 30 0 L 150 160" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3,3" />

        <!-- Case 1 -->
        <g transform="translate(150, -100)">
            <rect width="180" height="40" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
            <text x="90" y="25" font-family="monospace" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">case 1:</text>
        </g>

        <!-- Case 2 (The Match) -->
        <g transform="translate(150, -20)">
            <rect width="180" height="40" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="4" />
            <text x="90" y="25" font-family="monospace" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">case 2:</text>
            
            <!-- Code execution box inside case 2 -->
            <rect x="200" y="-10" width="150" height="60" rx="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" />
            <text x="275" y="15" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#1d4ed8" font-weight="bold" text-anchor="middle">음료 배출 🥤</text>
            <text x="275" y="35" font-family="monospace" font-size="14" fill="#ef4444" font-weight="bold" text-anchor="middle">break;</text>
        </g>

        <!-- Case 3 -->
        <g transform="translate(150, 60)">
            <rect width="180" height="40" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
            <text x="90" y="25" font-family="monospace" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">case 3:</text>
        </g>

        <!-- Default -->
        <g transform="translate(150, 140)">
            <rect width="180" height="40" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
            <text x="90" y="25" font-family="monospace" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">default:</text>
        </g>

        <!-- The exiting line from break -->
        <path d="M 500 0 L 580 0 L 580 200" fill="none" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow-blue)" />

        <!-- Tracing Data Animation (state = 2) -->
        <!-- Plugs directly into case 2 -->
        <circle cx="0" cy="0" r="12" fill="#ef4444">
            <animateMotion dur="4s" repeatCount="indefinite" path="M -100 -40 L 0 0 L 150 0 L 350 0 L 400 0 L 430 0 L 430 200" keyTimes="0; 0.2; 0.4; 0.6; 0.7; 0.8; 1" />
        </circle>
        <text x="0" y="0" font-family="monospace" font-size="16" fill="#ffffff" font-weight="bold">
            <animateMotion dur="4s" repeatCount="indefinite" path="M -100 -40 L 0 0 L 150 0 L 350 0 L 400 0 L 430 0 L 430 200" keyTimes="0; 0.2; 0.4; 0.6; 0.7; 0.8; 1" />
            <tspan dx="-5" dy="5">2</tspan>
        </text>

        <!-- End block -->
        <rect x="520" y="200" width="120" height="40" rx="5" fill="#e2e8f0" stroke="#64748b" stroke-width="2" />
        <text x="580" y="225" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" font-weight="bold" text-anchor="middle">조건문 탈출 (End)</text>
    </g>

    <text x="400" y="450" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#9f1239" font-weight="bold" text-anchor="middle">👆 애니메이션 설명: if문처럼 물어보지 않고, state 값(2)과 일치하는 케이스로 곧바로 직행(Jump) 합니다!</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
        </marker>
    </defs>
</svg>
