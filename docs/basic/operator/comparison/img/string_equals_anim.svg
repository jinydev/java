<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="350">
    <rect width="800" height="350" fill="#f8fafc" rx="15" />
    <rect width="796" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">문자열 비교의 함정: == vs .equals() 🚨</text>

    <!-- Memory Map -->
    <g transform="translate(400, 90)">
        <rect x="-300" y="0" width="250" height="100" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
        <rect x="50" y="0" width="250" height="100" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />

        <!-- Address 100 -->
        <g transform="translate(-175, 50)">
            <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#38bdf8" />
            <text x="0" y="-45" font-family="monospace" font-size="14" fill="#64748b" text-anchor="middle">주소 100번지</text>
            <text x="0" y="8" font-family="monospace" font-size="24" fill="white" font-weight="bold" text-anchor="middle">"Java"</text>
        </g>

        <!-- Address 200 -->
        <g transform="translate(175, 50)">
            <rect x="-80" y="-30" width="160" height="60" rx="8" fill="#38bdf8" />
            <text x="0" y="-45" font-family="monospace" font-size="14" fill="#64748b" text-anchor="middle">주소 200번지</text>
            <text x="0" y="8" font-family="monospace" font-size="24" fill="white" font-weight="bold" text-anchor="middle">"Java"</text>
        </g>
    </g>

    <!-- Comparing Mechanism (Animations) -->
    
    <!-- == Comparison (Fails because addresses differ) -->
    <g transform="translate(200, 240)">
        <rect x="-120" y="-30" width="240" height="60" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="0" y="-5" font-family="monospace" font-size="18" fill="#b91c1c" text-anchor="middle" font-weight="bold">str1 == str2</text>
        <text x="0" y="15" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">(주소 비교: 100 == 200 ?)</text>
        
        <g transform="translate(0, 50)">
            <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#ef4444" />
            <text x="0" y="5" font-family="monospace" font-size="16" fill="white" font-weight="bold" text-anchor="middle">false</text>
        </g>
    </g>

    <!-- .equals() Comparison (Succeeds because content matches) -->
    <g transform="translate(600, 240)">
        <rect x="-120" y="-30" width="240" height="60" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="3" />
        <text x="0" y="-5" font-family="monospace" font-size="18" fill="#15803d" text-anchor="middle" font-weight="bold">str1.equals(str2)</text>
        <text x="0" y="15" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#16a34a" text-anchor="middle">(내용 비교: "Java" == "Java" ?)</text>
        
        <g transform="translate(0, 50)">
            <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#22c55e" />
            <text x="0" y="5" font-family="monospace" font-size="16" fill="white" font-weight="bold" text-anchor="middle">true</text>
        </g>
    </g>

</svg>
