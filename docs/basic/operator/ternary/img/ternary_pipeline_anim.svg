<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">삼항 연산자의 파이프라인 흐름 🌊</text>
    
    <!-- Code display -->
    <g transform="translate(100, 80)">
        <rect width="600" height="60" rx="10" fill="#1e293b" />
        <text x="300" y="38" font-family="monospace" font-size="22" fill="#ffffff" text-anchor="middle">
            <tspan fill="#64748b">String ticket =</tspan> <tspan fill="#eab308" font-weight="bold">(age >= 19)</tspan> <tspan fill="#ef4444">?</tspan> <tspan fill="#22c55e">"성인"</tspan> <tspan fill="#ef4444">:</tspan> <tspan fill="#3b82f6">"학생"</tspan> <tspan fill="#64748b">;</tspan>
        </text>
    </g>

    <!-- Pipeline Architecture -->
    <g transform="translate(150, 180)">
        
        <!-- Input Variable (Age) -->
        <g transform="translate(-80, 50)">
            <ellipse cx="40" cy="0" rx="40" ry="25" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="40" y="5" font-family="monospace" font-size="18" fill="#a16207" font-weight="bold" text-anchor="middle">
                 <!-- Flip between 15 and 25 -->
                 <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="6s" repeatCount="indefinite" />
                 age=15
            </text>
            <text x="40" y="5" font-family="monospace" font-size="18" fill="#a16207" font-weight="bold" text-anchor="middle" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.5;0.95;1" dur="6s" repeatCount="indefinite" />
                 age=25
            </text>
        </g>
        
        <!-- Arrow to Condition -->
        <path d="M -10 50 L 50 50" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#triangle)" />
        
        <!-- Condition Check (The Question Mark) -->
        <g transform="translate(120, 50)">
            <!-- Diamond shape -->
            <polygon points="0,-40 60,0 0,40 -60,0" fill="#fef9c3" stroke="#eab308" stroke-width="4" />
            <text x="0" y="0" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">age >= 19</text>
            
            <!-- Question mark label above -->
            <circle cx="0" cy="-60" r="18" fill="#ef4444" />
            <text x="0" y="-53" font-family="monospace" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">?</text>
            <text x="0" y="-90" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">조건 검문소</text>
        </g>
        
        <!-- Paths Splitting (The Colon) -->
        <!-- True Path (Up) -->
        <path d="M 180 50 L 220 50 L 220 -20 L 250 -20" fill="none" stroke="#22c55e" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#triangle-green)" />
        <!-- False Path (Down) -->
        <path d="M 180 50 L 220 50 L 220 120 L 250 120" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#triangle-blue)" />
        
        <!-- The Colon Gateway label -->
        <circle cx="220" cy="50" r="18" fill="#ef4444" />
        <text x="220" y="57" font-family="monospace" font-size="24" fill="#ffffff" font-weight="bold" text-anchor="middle">:</text>
        <text x="220" y="90" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">갈림길</text>
        
        <!-- True Value Result (Adult) -->
        <g transform="translate(280, -20)">
            <rect width="100" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
            <text x="50" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">"성인"</text>
            <text x="50" y="-10" font-family="monospace" font-size="14" fill="#22c55e" font-weight="bold" text-anchor="middle">True 일 때</text>
        </g>
        
        <!-- False Value Result (Student) -->
        <g transform="translate(280, 120)">
            <rect width="100" height="40" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
            <text x="50" y="25" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#1d4ed8" font-weight="bold" text-anchor="middle">"학생"</text>
            <text x="50" y="-10" font-family="monospace" font-size="14" fill="#3b82f6" font-weight="bold" text-anchor="middle">False 일 때</text>
        </g>
        
        <!-- Paths Merging to Assignment -->
        <path d="M 380 0 L 420 0 L 420 50 L 450 50" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#triangle)" />
        <path d="M 380 140 L 420 140 L 420 50" fill="none" stroke="#64748b" stroke-width="4" />
        
        <!-- Final Output (Assignment) -->
        <g transform="translate(470, 50)">
            <rect width="120" height="60" y="-30" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3" />
            <text x="60" y="-45" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">최종 보관함 (ticket)</text>
            
            <!-- Result text toggling -->
            <text x="60" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#1d4ed8" font-weight="bold" text-anchor="middle">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.25;0.45;0.5" dur="6s" repeatCount="indefinite" />
                 "학생"
            </text>
            <text x="60" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#15803d" font-weight="bold" text-anchor="middle" opacity="0">
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.75;0.95;1" dur="6s" repeatCount="indefinite" />
                 "성인"
            </text>
        </g>

    </g>

    <!-- Traveling Data Point Animations -->
    <!-- Cycle 1: age=15 (False) -> Goes down -->
    <circle cx="150" cy="230" r="10" fill="#f59e0b">
         <animateMotion dur="6s" repeatCount="indefinite" path="M -80 0 L 120 0 L 120 70 L 250 70 L 350 70 L 350 0 L 400 0" keyTimes="0; 0.1; 0.15; 0.2; 0.25; 0.3; 1" />
         <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.31;0.99;1" dur="6s" repeatCount="indefinite" />
    </circle>
    
    <!-- Cycle 2: age=25 (True) -> Goes up -->
    <circle cx="150" cy="230" r="10" fill="#f59e0b" opacity="0">
         <animateMotion dur="6s" repeatCount="indefinite" path="M -80 0 L 120 0 L 120 -70 L 250 -70 L 350 -70 L 350 0 L 400 0" keyTimes="0; 0.5; 0.6; 0.65; 0.7; 0.75; 0.8; 1" />
         <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.5;0.8;0.81" dur="6s" repeatCount="indefinite" />
    </circle>

    <!-- Definition of arrowheads -->
    <defs>
        <marker id="triangle" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
        </marker>
        <marker id="triangle-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#22c55e" />
        </marker>
        <marker id="triangle-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
        </marker>
    </defs>
</svg>
