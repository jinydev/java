<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">복합 대입 연산자: 돼지 저금통 다루기 🐷</text>

    <!-- Top Section: Basic Assignment (money = money + 500) -->
    <text x="50" y="90" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#475569" font-weight="bold">1. 일반 원리: "배 갈라서 꺼낸 다음, 더해서 다시 넣기"</text>
    <g transform="translate(50, 110)">
        <rect width="700" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
        
        <!-- Code block -->
        <rect x="20" y="40" width="180" height="40" rx="5" fill="#1e293b" />
        <text x="30" y="65" font-family="monospace" font-size="16" fill="#10b981" font-weight="bold">m = m + 500;</text>
        
        <!-- Existing Piggy Bank -->
        <g transform="translate(250, 60)">
            <ellipse cx="40" cy="0" rx="30" ry="25" fill="#fbcfe8" stroke="#f472b6" stroke-width="3" />
            <text x="40" y="5" font-family="monospace" font-size="16" fill="#be185d" font-weight="bold" text-anchor="middle">1000</text>
            <text x="40" y="-35" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">변수 m</text>
            
            <!-- Extracting animation -->
            <path d="M 40 -25 L 40 -60 M 40 -60 L 80 -60" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,5">
                 <animate attributeName="stroke-dashoffset" from="30" to="0" dur="2s" repeatCount="indefinite" />
            </path>
        </g>
        
        <!-- Calculation Area (CPU) -->
        <g transform="translate(360, 45)">
            <rect width="180" height="45" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="90" y="27" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">
                 <tspan fill="#dc2626">1000</tspan> + 500 = <tspan fill="#16a34a">1500</tspan>
            </text>
        </g>
        
        <!-- Re-assigning animation -->
        <g transform="translate(560, 65)">
            <path d="M 0 -20 L 60 -20 M 60 -20 L 60 0 L 30 0" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow)">
                 <animate attributeName="stroke-dasharray" values="0,100; 100,0; 100,0" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
            </path>
            <!-- Updated Piggy Bank -->
            <ellipse cx="120" cy="0" rx="30" ry="25" fill="#fbcfe8" stroke="#f472b6" stroke-width="3" />
            <text x="120" y="5" font-family="monospace" font-size="16" fill="#be185d" font-weight="bold" text-anchor="middle">
                 <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />1500
            </text>
        </g>
    </g>

    <!-- Bottom Section: Compound Assignment (money += 500) -->
    <text x="50" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#475569" font-weight="bold">2. 복합 대입: "배 가르지 말고 위로 그냥 쑤욱 밀어넣기"</text>
    <g transform="translate(50, 300)">
        <rect width="700" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
        
        <!-- Code block -->
        <rect x="20" y="40" width="180" height="40" rx="5" fill="#1e293b" />
        <text x="30" y="65" font-family="monospace" font-size="16" fill="#3b82f6" font-weight="bold">m += 500;</text>
        
        <!-- Piggy Bank -->
        <g transform="translate(300, 65)">
            <!-- Coin inserting -->
            <circle cx="0" cy="-60" r="15" fill="#fcd34d" stroke="#d97706" stroke-width="2">
                 <animate attributeName="cy" values="-60;-10;-60" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="1;0;0;" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
            </circle>
            <text x="0" y="-55" font-family="monospace" font-size="12" fill="#92400e" font-weight="bold" text-anchor="middle">
                 <animate attributeName="y" values="-55;-5;-55" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
                 <animate attributeName="opacity" values="1;0;0;" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />
                 500
            </text>

            <ellipse cx="0" cy="0" rx="40" ry="35" fill="#fbcfe8" stroke="#db2777" stroke-width="4" />
            <!-- Slot -->
            <line x1="-15" y1="-25" x2="15" y2="-25" stroke="#9d174d" stroke-width="4" stroke-linecap="round" />
            
            <text x="0" y="10" font-family="monospace" font-size="20" fill="#be185d" font-weight="bold" text-anchor="middle">
                 <tspan opacity="1"><animate attributeName="opacity" values="1;0;0" keyTimes="0;0.49;1" dur="2s" repeatCount="indefinite" />1000</tspan>
                 <tspan opacity="0"><animate attributeName="opacity" values="0;1;1" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite" />1500</tspan>
            </text>
            <text x="0" y="-45" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">변수 m</text>
        </g>
        
        <text x="450" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#2563eb" font-weight="bold">
            <tspan x="450" dy="0">✔ 코드가 엄청 짧아짐!</tspan>
            <tspan x="450" dy="25">✔ 내부적으로 알아서 계산해서 누적함!</tspan>
        </text>
    </g>

    <!-- Arrowhead Definition -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
        </marker>
    </defs>
</svg>
