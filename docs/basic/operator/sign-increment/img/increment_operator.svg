<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="350">
    <!-- Background -->
    <rect width="600" height="350" fill="#f8fafc" rx="15" />
    <rect width="596" height="346" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="300" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#1e293b" text-anchor="middle">전위(Prefix) vs 후위(Postfix) 연산자</text>
    <text x="300" y="60" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">int x = 1, y = 1; (두 연산의 순서 경주를 지켜보세요!)</text>

    <!-- Track 1: ++x + 10 -->
    <g transform="translate(20, 90)">
        <rect width="560" height="100" fill="white" rx="8" stroke="#cbd5e1" stroke-width="2"/>
        <text x="20" y="30" font-family="monospace" font-size="16" fill="#0f172a" font-weight="bold">[++x + 10] 전위 (먼저 증가!)</text>
        
        <!-- Step 1: ++x -->
        <g transform="translate(150, 40)">
            <rect width="100" height="40" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
            <text x="50" y="25" font-family="sans-serif" font-size="14" fill="#166534" text-anchor="middle" font-weight="bold">1. 증가(x=2)</text>
            <!-- Animation highlight -->
            <rect width="100" height="40" rx="20" fill="#22c55e" opacity="0">
                <animate attributeName="opacity" values="0;0.5;0;0" keyTimes="0;0.1;0.4;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
        
        <!-- Step 2: + 10 -->
        <g transform="translate(300, 40)">
            <rect width="100" height="40" rx="20" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" />
            <text x="50" y="25" font-family="sans-serif" font-size="14" fill="#075985" text-anchor="middle" font-weight="bold">2. 연산(+10)</text>
            <rect width="100" height="40" rx="20" fill="#0ea5e9" opacity="0">
                <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.3;0.4;0.7;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
        
        <!-- Result -->
        <g transform="translate(450, 40)">
            <rect width="80" height="40" rx="10" fill="#fef08a" stroke="#eab308" stroke-width="2" />
            <text x="40" y="25" font-family="sans-serif" font-size="16" fill="#854d0e" text-anchor="middle" font-weight="bold">결과: 12</text>
            <rect width="80" height="40" rx="10" fill="white" opacity="1">
                <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.6;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
    </g>

    <!-- Track 2: y++ + 10 -->
    <g transform="translate(20, 210)">
        <rect width="560" height="100" fill="white" rx="8" stroke="#cbd5e1" stroke-width="2"/>
        <text x="20" y="30" font-family="monospace" font-size="16" fill="#0f172a" font-weight="bold">[y++ + 10] 후위 (연산 먼저!)</text>
        
        <!-- Step 1: 연산(y는 아직 1) -->
        <g transform="translate(150, 40)">
            <rect width="100" height="40" rx="20" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2" />
            <text x="50" y="25" font-family="sans-serif" font-size="14" fill="#075985" text-anchor="middle" font-weight="bold">1. 연산(+10)</text>
            <rect width="100" height="40" rx="20" fill="#0ea5e9" opacity="0">
                <animate attributeName="opacity" values="0;0.5;0;0" keyTimes="0;0.1;0.4;1" dur="6s" repeatCount="indefinite"/>
            </rect>            
        </g>
        
        <!-- Result -->
        <g transform="translate(450, 40)">
            <!-- Notice result shows up earlier! -->
            <rect width="80" height="40" rx="10" fill="#fef08a" stroke="#eab308" stroke-width="2" />
            <text x="40" y="25" font-family="sans-serif" font-size="16" fill="#854d0e" text-anchor="middle" font-weight="bold">결과: 11</text>
            <rect width="80" height="40" rx="10" fill="white" opacity="1">
                <!-- Result appears early because operation completes before increment -->
                <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.4;0.9;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
        
        <!-- Step 2: 증가(y=2) -->
        <g transform="translate(300, 40)">
            <rect width="100" height="40" rx="20" fill="#dcfce7" stroke="#22c55e" stroke-width="2" />
            <text x="50" y="25" font-family="sans-serif" font-size="14" fill="#166534" text-anchor="middle" font-weight="bold">2. 증가(y=2)</text>
            <rect width="100" height="40" rx="20" fill="#22c55e" opacity="0">
                <!-- Delay until AFTER result is calculated -->
                <animate attributeName="opacity" values="0;0;0.5;0;0" keyTimes="0;0.6;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
    </g>
    
    <!-- Paths and Flow Indicators -->
    <path d="M 270 150 L 310 150" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 420 150 L 460 150" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
    <path d="M 270 270 L 460 270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4,4" />
    <!-- Indicator for the postponed increment -->
    <path d="M 460 270 L 410 270" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrowhead)">
         <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.6;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <text x="430" y="260" font-size="12" fill="#ef4444" font-weight="bold" opacity="0">
        나중에 증가!
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.6;0.7;0.9;1" dur="6s" repeatCount="indefinite"/>
    </text>
    
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="10 0, 0 3.5, 10 7" fill="#ef4444" />
        </marker>
    </defs>
</svg>
