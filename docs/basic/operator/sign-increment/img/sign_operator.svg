<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 250" width="100%" height="250">
    <!-- Background -->
    <rect width="600" height="250" fill="#f8fafc" rx="15" />
    <rect width="596" height="246" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />

    <!-- Title -->
    <text x="300" y="40" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#334155" text-anchor="middle">부호 연산자 (-x) 의 마법</text>

    <!-- Initial Box x = -100 -->
    <g transform="translate(150, 100)">
        <rect width="120" height="80" rx="10" fill="#bae6fd" stroke="#0ea5e9" stroke-width="3" />
        <text x="60" y="35" font-family="monospace" font-size="16" fill="#0369a1" text-anchor="middle" font-weight="bold">int x</text>
        <text x="60" y="65" font-family="monospace" font-size="24" fill="#0284c7" text-anchor="middle" font-weight="bold">-100</text>
    </g>

    <!-- Target Box result -->
    <g transform="translate(330, 100)">
        <rect width="120" height="80" rx="10" fill="#fef08a" stroke="#eab308" stroke-width="3" />
        <text x="60" y="35" font-family="monospace" font-size="16" fill="#a16207" text-anchor="middle" font-weight="bold">result</text>
        <!-- The result value mapping, starts hidden, appears after collision -->
        <text x="60" y="65" font-family="monospace" font-size="24" fill="#854d0e" text-anchor="middle" font-weight="bold" opacity="0">
            100
            <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="4s" repeatCount="indefinite" />
        </text>
    </g>

    <!-- Flying Minus Sign -->
    <g>
        <circle cx="0" cy="0" r="25" fill="#ef4444" />
        <text x="0" y="8" font-family="monospace" font-size="30" fill="white" text-anchor="middle" font-weight="bold">-</text>
        <animateTransform attributeName="transform" type="translate" 
            values="100,140; 260,140; 260,140; 100,140" 
            keyTimes="0; 0.3; 0.9; 1" 
            dur="4s" repeatCount="indefinite" />
        <!-- Fade out minus sign upon collision -->
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.4;0.9;1" dur="4s" repeatCount="indefinite" />
    </g>

    <!-- Multiplication visual hint -->
    <text x="210" y="215" font-family="'Segoe UI', sans-serif" font-size="16" fill="#ef4444" font-weight="bold" text-anchor="middle" opacity="0">
        × (-1) 효과!
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.9;1" dur="4s" repeatCount="indefinite" />
    </text>

    <!-- Arrow from x to result -->
    <path d="M 270 140 L 320 140" stroke="#94a3b8" stroke-width="4" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.9;1" dur="4s" repeatCount="indefinite" />
    </path>

    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>
</svg>
