<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">연산자 우선순위 피라미드 🥇</text>
    <text x="400" y="65" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">위쪽(꼭대기)에 있을수록 먼저 계산됩니다.</text>

    <!-- The Pyramid -->
    <g transform="translate(100, 100)">
        
        <!-- Level 1: Parentheses -->
        <g transform="translate(250, 0)">
            <polygon points="50,0 150,0 180,50 20,50" fill="#fef08a" stroke="#eab308" stroke-width="2" />
            <text x="100" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#854d0e" font-weight="bold" text-anchor="middle">1. 괄호 `()`</text>
            <circle cx="20" cy="25" r="15" fill="#eab308" />
            <text x="20" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="white" font-weight="bold" text-anchor="middle">★</text>
            
            <animateTransform attributeName="transform" type="translate" values="250,0; 250,-10; 250,0" dur="2s" repeatCount="indefinite" />
        </g>

        <!-- Level 2: Unary -->
        <g transform="translate(200, 60)">
            <polygon points="70,0 230,0 260,50 40,50" fill="#fed7aa" stroke="#f97316" stroke-width="2" />
            <text x="150" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#9a3412" font-weight="bold" text-anchor="middle">2. 단항 (`++, --, !, ~`)</text>
        </g>

        <!-- Level 3: Arithmetic -->
        <g transform="translate(150, 120)">
            <polygon points="90,0 310,0 340,50 60,50" fill="#fecaca" stroke="#ef4444" stroke-width="2" />
            <text x="200" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#991b1b" font-weight="bold" text-anchor="middle">3. 산술 (`*, /, %` ➔ `+, -`)</text>
        </g>

        <!-- Level 4: Comparison -->
        <g transform="translate(100, 180)">
            <polygon points="110,0 390,0 420,50 80,50" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" />
            <text x="250" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#1e40af" font-weight="bold" text-anchor="middle">4. 비교 (`>, <, >=, <=, ==, !=`)</text>
        </g>

        <!-- Level 5: Logical -->
        <g transform="translate(50, 240)">
            <polygon points="130,0 470,0 500,50 100,50" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" />
            <text x="300" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#166534" font-weight="bold" text-anchor="middle">5. 논리 (`&&, ||`)</text>
        </g>

        <!-- Level 6: Assignment -->
        <g transform="translate(0, 300)">
            <polygon points="150,0 550,0 580,50 120,50" fill="#e2e8f0" stroke="#64748b" stroke-width="2" />
            <text x="350" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#334155" font-weight="bold" text-anchor="middle">6. 대입 (`=, +=, -=...`)</text>
        </g>
    </g>

    <!-- Side Arrow -->
    <g transform="translate(680, 150)">
         <path d="M 0 0 L 0 200" stroke="#94a3b8" stroke-width="6" marker-end="url(#arrowdown)" fill="none" />
         <text x="-20" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#64748b" font-weight="bold" transform="rotate(-90 -20 100)" text-anchor="middle">우선순위 낮아짐</text>
    </g>

    <defs>
        <marker id="arrowdown" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
        </marker>
    </defs>

</svg>
