<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
    <rect width="800" height="450" fill="#f8fafc" rx="15" />
    <rect width="796" height="446" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">연산의 방향성 (Associativity) 애니메이션 🔄</text>

    <!-- Top Section: Left-to-Right -->
    <text x="50" y="90" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#475569" font-weight="bold">1. 일반적인 덧셈/뺄셈: 왼쪽 ➔ 오른쪽 방향</text>
    <g transform="translate(50, 110)">
        <rect width="700" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
        
        <text x="350" y="40" font-family="monospace" font-size="28" fill="#0f172a" font-weight="bold" text-anchor="middle">
            <tspan fill="#3b82f6">100</tspan> - <tspan fill="#eab308">20</tspan> - <tspan fill="#22c55e">10</tspan>
        </text>
        
        <!-- Step 1 Highlighting box -->
        <rect x="260" y="10" width="130" height="40" rx="5" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4">
             <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="4s" repeatCount="indefinite" />
        </rect>
        
        <!-- Step 2 Highlighting box -->
        <rect x="390" y="10" width="90" height="40" rx="5" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="4,4" opacity="0">
             <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="4s" repeatCount="indefinite" />
        </rect>
        <path d="M 330 55 L 390 55 M 390 55 L 430 55 430 30" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" opacity="0">
             <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="4s" repeatCount="indefinite" />
        </path>

        <!-- Dynamic Output -->
        <g transform="translate(250, 80)">
             <text x="0" y="20" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#dc2626" font-weight="bold">
                 <tspan opacity="1">
                     <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="4s" repeatCount="indefinite" />
                     1단계: 100 - 20 = 80
                 </tspan>
             </text>
             <text x="140" y="20" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" fill="#dc2626" font-weight="bold" opacity="0">
                 <tspan opacity="0">
                     <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.55;0.95;1" dur="4s" repeatCount="indefinite" />
                     2단계: 80 - 10 = 최종 70
                 </tspan>
             </text>
        </g>
    </g>

    <!-- Bottom Section: Right-to-Left (Assignment) -->
    <text x="50" y="280" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" fill="#475569" font-weight="bold">2. 대입 연산자(=): 오른쪽 ➔ 왼쪽 방향 (거꾸로)</text>
    <g transform="translate(50, 300)">
        <rect width="700" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
        
        <!-- Code expression -->
        <text x="350" y="40" font-family="monospace" font-size="28" fill="#0f172a" font-weight="bold" text-anchor="middle">
            <tspan fill="#ec4899">a</tspan> = <tspan fill="#a855f7">b</tspan> = <tspan fill="#ef4444">c</tspan> = <tspan fill="#10b981">5</tspan>
        </text>

        <!-- Base Boxes -->
        <g transform="translate(260, 50)" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">
             <!-- Box A -->
             <rect x="0" y="0" width="40" height="40" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="2" />
             <text x="20" y="25" fill="#be185d">
                 <animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.3;0.6;0.9;1" dur="6s" repeatCount="indefinite" />5
             </text>
             <text x="20" y="60" fill="#64748b" font-size="12">상자 a</text>
             
             <!-- Box B -->
             <rect x="70" y="0" width="40" height="40" rx="5" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" />
             <text x="90" y="25" fill="#7e22ce">
                 <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.3;0.6;0.61;1" dur="6s" repeatCount="indefinite" />5
             </text>
             <text x="90" y="60" fill="#64748b" font-size="12">상자 b</text>

             <!-- Box C -->
             <rect x="140" y="0" width="40" height="40" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
             <text x="160" y="25" fill="#b91c1c">
                 <animate attributeName="opacity" values="0;1;1;1;1" keyTimes="0;0.31;0.6;0.9;1" dur="6s" repeatCount="indefinite" />5
             </text>
             <text x="160" y="60" fill="#64748b" font-size="12">상자 c</text>
        </g>
        
        <!-- The Number 5 Origin -->
        <circle cx="475" cy="70" r="15" fill="#d1fae5" stroke="#10b981" stroke-width="2" />
        <text x="475" y="75" font-family="monospace" font-size="16" fill="#047857" font-weight="bold" text-anchor="middle">5</text>
        <text x="475" y="110" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">오른쪽 끝 값</text>

        <!-- Arrows Right-to-Left -->
        <!-- 5 into C -->
        <path d="M 460 70 L 420 70" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)">
             <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.3;0.31;0.99;1" dur="6s" repeatCount="indefinite" />
        </path>
        
        <!-- C into B -->
        <path d="M 400 70 L 370 70" fill="none" stroke="#a855f7" stroke-width="3" marker-end="url(#arrow-purple)" opacity="0">
             <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.3;0.31;0.6;0.61" dur="6s" repeatCount="indefinite" />
        </path>

        <!-- B into A -->
        <path d="M 330 70 L 300 70" fill="none" stroke="#ec4899" stroke-width="3" marker-end="url(#arrow-pink)" opacity="0">
             <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.3;0.6;0.61;0.9;0.91;1" dur="6s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- Definition of arrowheads -->
    <defs>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
        </marker>
        <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#a855f7" />
        </marker>
        <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ec4899" />
        </marker>
    </defs>
</svg>
