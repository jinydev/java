<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <defs>
        <linearGradient id="stackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fdf4ff" />
            <stop offset="100%" stop-color="#f5d0fe" />
        </linearGradient>
        <linearGradient id="heapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ecfeff" />
            <stop offset="100%" stop-color="#a5f3fc" />
        </linearGradient>
        <!-- Data stream particle animation -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">자바 메모리 구조 애니메이션 (Stack vs Heap) 🧠</text>

    <!-- Stack Area (Left) -->
    <rect x="50" y="80" width="300" height="360" rx="10" fill="url(#stackGrad)" stroke="#c026d3" stroke-width="3" stroke-dasharray="10,5" />
    <text x="200" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#86198f" text-anchor="middle">Stack (스택 영역)</text>
    <text x="200" y="140" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a21caf" text-anchor="middle">내 코앞 책상 (좁지만 빠름!)</text>
    
    <!-- Primitive Type in Stack -->
    <rect x="80" y="170" width="240" height="60" rx="5" fill="#f8fafc" stroke="#d946ef" stroke-width="2" />
    <text x="95" y="195" font-family="monospace" font-size="16" fill="#64748b" font-weight="bold">기본 타입 (int)</text>
    <text x="95" y="215" font-family="monospace" font-size="18" fill="#1e293b" font-weight="bold">`age`</text>
    <rect x="220" y="180" width="80" height="40" rx="5" fill="#fca5a5" />
    <text x="260" y="206" font-family="monospace" font-size="18" fill="#7f1d1d" font-weight="bold" text-anchor="middle">25</text>
    <text x="260" y="245" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#ef4444" font-weight="bold" text-anchor="middle">진짜 값이 들어있음!</text>

    <!-- Reference Type in Stack -->
    <rect x="80" y="280" width="240" height="60" rx="5" fill="#f8fafc" stroke="#d946ef" stroke-width="2" />
    <text x="95" y="305" font-family="monospace" font-size="16" fill="#64748b" font-weight="bold">참조 타입 (String)</text>
    <text x="95" y="325" font-family="monospace" font-size="18" fill="#1e293b" font-weight="bold">`name`</text>
    <rect x="200" y="290" width="100" height="40" rx="5" fill="#10b981" />
    <text x="250" y="316" font-family="monospace" font-size="16" fill="#ffffff" font-weight="bold" text-anchor="middle">0x100A</text>
    <text x="250" y="355" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" fill="#059669" font-weight="bold" text-anchor="middle">리모컨 (메모리 번지수)</text>


    <!-- Heap Area (Right) -->
    <rect x="450" y="80" width="300" height="360" rx="10" fill="url(#heapGrad)" stroke="#06b6d4" stroke-width="3" stroke-dasharray="10,5" />
    <text x="600" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="bold" fill="#155e75" text-anchor="middle">Heap (힙 영역)</text>
    <text x="600" y="140" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#0e7490" text-anchor="middle">거대 물류 창고 (무한에 가까움)</text>

    <!-- Object in Heap -->
    <rect x="490" y="240" width="220" height="120" rx="5" fill="#ffffff" stroke="#0891b2" stroke-width="3" />
    
    <rect x="490" y="240" width="220" height="30" fill="#0891b2" />
    <text x="500" y="260" font-family="monospace" font-size="14" fill="#ffffff" font-weight="bold">번지수: 0x100A</text>
    
    <text x="600" y="310" font-family="monospace" font-size="28" fill="#1e293b" font-weight="bold" text-anchor="middle">"지니개발"</text>
    <text x="600" y="340" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#475569" font-weight="bold" text-anchor="middle">거대한 진짜 데이터 본체 📺</text>

    <!-- Pointer Laser Beam -->
    <path d="M 300 310 C 380 310 410 300 490 300" fill="none" stroke="#10b981" stroke-width="6" stroke-dasharray="10,10">
        <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <!-- Glowing Laser Pulse -->
    <circle cx="0" cy="0" r="6" fill="#a7f3d0" filter="url(#glow)">
        <animateMotion dur="2s" repeatCount="indefinite" path="M 300 310 C 380 310 410 300 490 300" />
    </circle>
</svg>
