<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <style>
    @keyframes scan {
      0%, 10% { transform: translateX(0); opacity: 0; }
      20%, 80% { opacity: 1; }
      90%, 100% { transform: translateX(250px); opacity: 0; }
    }
    @keyframes pop {
      0%, 30%, 100% { transform: scale(1); fill: #f8f9fa; }
      40%, 90% { transform: scale(1.15); fill: #fff3cd; stroke: #ffc107; stroke-width: 3;}
    }
    .anim-scan { animation: scan 6s infinite; }
    .anim-pop { animation: pop 6s infinite; transform-origin: center; }
    .code-text { font-family: monospace; font-size: 16px; font-weight: bold; fill: #20c997; }
    .comment-text { font-family: sans-serif; font-size: 14px; fill: #6c757d; }
    .box-text { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #0d6efd; text-anchor: middle; }
    .index-text { font-family: sans-serif; font-size: 12px; fill: #6c757d; text-anchor: middle; font-weight: bold; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">자바 문자열(String) 조작 마술쇼 🪄</text>

  <!-- 기준 문자열 -->
  <g transform="translate(250, 70)">
    <!-- J A V A 텍스트 박스들 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="10" width="50" height="50" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/>
      <text x="25" y="42" class="box-text">J</text>
      <text x="25" y="-5" class="index-text">[0]</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="0" y="10" width="50" height="50" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/>
      <text x="25" y="42" class="box-text">A</text>
      <text x="25" y="-5" class="index-text">[1]</text>
    </g>
    <!-- V는 애니메이션 되도록 분리 -->
    <g transform="translate(120, 0)">
      <rect x="0" y="10" width="50" height="50" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2" class="anim-pop"/>
      <text x="25" y="42" class="box-text text-pop">V</text>
      <text x="25" y="-5" class="index-text">[2]</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="0" y="10" width="50" height="50" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="2"/>
      <text x="25" y="42" class="box-text">A</text>
      <text x="25" y="-5" class="index-text">[3]</text>
    </g>
    
    <!-- 스캐너 바 -->
    <rect x="-10" y="0" width="10" height="70" fill="#dc3545" class="anim-scan"/>
  </g>

  <!-- length() 설명 -->
  <g transform="translate(50, 200)">
    <rect width="320" height="80" rx="8" fill="#212529" stroke="none"/>
    <text x="20" y="30" class="code-text"><tspan fill="#fd7e14">int</tspan> len = str.<tspan fill="#e83e8c">length()</tspan>;</text>
    <text x="20" y="60" class="comment-text">↳ 전체 글자 수 반환: <tspan fill="#fff" font-weight="bold">4</tspan></text>
    
    <!-- 길이 측정 자 -->
    <path d="M 190 -20 L 190 -40 L 450 -40 L 450 -20" fill="none" stroke="#6f42c1" stroke-width="2" stroke-dasharray="4"/>
    <text x="320" y="-45" font-family="sans-serif" font-size="14" font-weight="bold" fill="#6f42c1" text-anchor="middle">.length() == 4</text>
  </g>

  <!-- charAt() 설명 -->
  <g transform="translate(430, 200)">
    <rect width="320" height="80" rx="8" fill="#212529" stroke="none"/>
    <text x="20" y="30" class="code-text"><tspan fill="#fd7e14">char</tspan> c = str.<tspan fill="#e83e8c">charAt(2)</tspan>;</text>
    <text x="20" y="60" class="comment-text">↳ 인덱스 2번 문자 추출: <tspan fill="#ffc107" font-weight="bold">'V'</tspan></text>
    
    <!-- 핀셋 화살표 -->
    <path d="M 120 -80 L 120 -30" fill="none" stroke="#ffc107" stroke-width="3" marker-end="url(#arrow-yellow)"/>
  </g>

  <!-- replace() / substring() 설명 -->
  <g transform="translate(50, 310)">
    <rect width="700" height="120" rx="8" fill="#212529" stroke="none"/>
    
    <!-- replace -->
    <text x="20" y="35" class="code-text"><tspan fill="#e83e8c">String</tspan> r = str.<tspan fill="#e83e8c">replace</tspan>("VA", "GU");</text>
    <text x="330" y="35" class="comment-text">↳ 글자 교체: <tspan fill="#fff" font-weight="bold">"JAGU"</tspan></text>

    <!-- substring -->
    <text x="20" y="70" class="code-text"><tspan fill="#e83e8c">String</tspan> sub = str.<tspan fill="#e83e8c">substring</tspan>(0, 2);</text>
    <text x="330" y="70" class="comment-text">↳ 0번부터 (2-1)번까지 자르기: <tspan fill="#fff" font-weight="bold">"JA"</tspan></text>

    <!-- indexOf -->
    <text x="20" y="105" class="code-text"><tspan fill="#fd7e14">int</tspan> idx = str.<tspan fill="#e83e8c">indexOf</tspan>("V");</text>
    <text x="330" y="105" class="comment-text">↳ 특정 글자의 인덱스 찾기: <tspan fill="#fff" font-weight="bold">2</tspan></text>
  </g>

  <defs>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffc107"/>
    </marker>
  </defs>
</svg>
