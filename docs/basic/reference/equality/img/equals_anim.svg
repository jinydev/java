<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes pulse-red { 0%, 100% { fill: #dc3545; } 50% { fill: #ff4757; } }
    @keyframes pulse-green { 0%, 100% { fill: #198754; } 50% { fill: #28a745; } }
    @keyframes scan { 0% { transform: translateY(-20px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(20px); opacity: 0; } }
    .scanner { fill: #0d6efd; opacity: 0.5; animation: scan 2s infinite; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">참조 타입 비교: == vs .equals()</text>

  <!-- == 연산자 비교 (주소 비교) -->
  <g transform="translate(50, 80)">
    <rect width="320" height="320" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="2"/>
    <rect width="320" height="40" rx="10" fill="#e9ecef" stroke="none"/>
    <text x="160" y="27" font-family="monospace" font-size="20" font-weight="bold" fill="#495057" text-anchor="middle">obj1 == obj2</text>
    
    <!-- 주소판 1 -->
    <rect x="30" y="80" width="100" height="50" rx="5" fill="#cff4fc" stroke="#0dcaf0" stroke-width="2"/>
    <text x="80" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#055160" text-anchor="middle">주소판 A</text>
    <text x="80" y="120" font-family="monospace" font-size="12" fill="#dc3545" font-weight="bold" text-anchor="middle">100번지</text>

    <!-- 주소판 2 -->
    <rect x="190" y="80" width="100" height="50" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="240" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#664d03" text-anchor="middle">주소판 B</text>
    <text x="240" y="120" font-family="monospace" font-size="12" fill="#dc3545" font-weight="bold" text-anchor="middle">200번지</text>

    <!-- 비교 -->
    <circle cx="160" cy="105" r="15" fill="#dc3545" style="animation: pulse-red 1s infinite;"/>
    <text x="160" y="110" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">X</text>
    
    <text x="160" y="170" font-family="sans-serif" font-size="16" fill="#dc3545" font-weight="bold" text-anchor="middle">주소(번지수)가 다르다!</text>
    <text x="160" y="200" font-family="sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">`==`는 메모리 주소만 봅니다.</text>
    
    <!-- 객체 집 -->
    <path d="M 40 260 L 80 230 L 120 260 L 120 300 L 40 300 Z" fill="#e2e3e5" stroke="#adb5bd" stroke-width="2"/>
    <text x="80" y="280" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">🏠</text>
    
    <path d="M 200 260 L 240 230 L 280 260 L 280 300 L 200 300 Z" fill="#e2e3e5" stroke="#adb5bd" stroke-width="2"/>
    <text x="240" y="280" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">🏠</text>
  </g>

  <!-- .equals() 비교 (내용 비교) -->
  <g transform="translate(430, 80)">
    <rect width="320" height="320" rx="10" fill="#fff" stroke="#adb5bd" stroke-width="2"/>
    <rect width="320" height="40" rx="10" fill="#e9ecef" stroke="none"/>
    <text x="160" y="27" font-family="monospace" font-size="20" font-weight="bold" fill="#495057" text-anchor="middle">obj1.equals(obj2)</text>
    
    <!-- 주소판 1 -->
    <rect x="30" y="80" width="100" height="50" rx="5" fill="#cff4fc" stroke="#0dcaf0" stroke-width="2"/>
    <text x="80" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#055160" text-anchor="middle">주소판 A</text>
    <text x="80" y="120" font-family="monospace" font-size="12" fill="#055160" text-anchor="middle">100번지</text>

    <!-- 주소판 2 -->
    <rect x="190" y="80" width="100" height="50" rx="5" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="240" y="100" font-family="sans-serif" font-size="14" font-weight="bold" fill="#664d03" text-anchor="middle">주소판 B</text>
    <text x="240" y="120" font-family="monospace" font-size="12" fill="#664d03" text-anchor="middle">200번지</text>

    <!-- 객체 집 -->
    <path d="M 40 260 L 80 230 L 120 260 L 120 300 L 40 300 Z" fill="#e2e3e5" stroke="#198754" stroke-width="3"/>
    <text x="80" y="280" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">🏠</text>
    
    <path d="M 200 260 L 240 230 L 280 260 L 280 300 L 200 300 Z" fill="#e2e3e5" stroke="#198754" stroke-width="3"/>
    <text x="240" y="280" font-family="sans-serif" font-size="18" fill="#333" text-anchor="middle">🏠</text>

    <!-- 스캐너 애니메이션 -->
    <rect class="scanner" x="40" y="250" width="80" height="5"/>
    <rect class="scanner" x="200" y="250" width="80" height="5"/>
    
    <!-- 비교 -->
    <circle cx="160" cy="265" r="15" fill="#198754" style="animation: pulse-green 1s infinite;"/>
    <text x="160" y="272" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">O</text>
    
    <text x="160" y="170" font-family="sans-serif" font-size="16" fill="#198754" font-weight="bold" text-anchor="middle">건물 모양(실제 내용)이 같다!</text>
    <text x="160" y="200" font-family="sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">`.equals()`는 알맹이를 검사합니다.</text>
  </g>
</svg>
