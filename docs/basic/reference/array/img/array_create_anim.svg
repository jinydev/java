<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes slide-in {
      0%, 20% { transform: translateX(50px); opacity: 0; }
      40%, 80% { transform: translateX(0); opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes error-shake {
      0%, 40% { transform: translateX(0); }
      45%, 55% { transform: translateX(-10px); }
      50%, 60% { transform: translateX(10px); }
      65%, 100% { transform: translateX(0); }
    }
    @keyframes show-solution {
      0%, 50% { opacity: 0; transform: translateY(20px); }
      60%, 90% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; }
    }
    .anim-slide { animation: slide-in 8s infinite; }
    .anim-err { animation: error-shake 8s infinite; }
    .anim-sol { animation: show-solution 8s infinite; }
    
    .code-text { font-family: monospace; font-size: 20px; font-weight: bold; }
    .label-text { font-family: sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #333; text-anchor: middle; }
  </style>

  <text x="400" y="50" class="title">배열 값 넣기 함정: { } 는 변수 탄생 시에만 가능!</text>

  <!-- 1. 정상 (탄생과 동시에 값 넣기) -->
  <g transform="translate(100, 100)">
    <rect width="600" height="60" rx="8" fill="#d1e7dd" stroke="#198754" stroke-width="2"/>
    <text x="30" y="38" class="code-text" fill="#198754">
      <tspan fill="#000">int[]</tspan> scores = <tspan fill="#198754">{ 90, 80 }</tspan>;
    </text>
    <text x="400" y="35" class="label-text" fill="#198754">✅ O.K! (선언형+할당형 일치)</text>
  </g>

  <!-- 2. 에러 (선언 후 나중에 넣기) -->
  <g transform="translate(100, 200)">
    <rect width="600" height="100" rx="8" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
    
    <text x="30" y="35" class="code-text" fill="#000">int[] scores;</text>
    
    <g class="anim-err">
      <text x="30" y="80" class="code-text">
        scores = <tspan fill="#dc3545" text-decoration="underline">{ 90, 80 }</tspan>;
      </text>
      <text x="350" y="75" class="label-text" fill="#dc3545">❌ Error! (컴파일러 어리둥절)</text>
    </g>
  </g>

  <!-- 3. 해결책 (나중에 넣을 거면 new int[] 명시!) -->
  <g transform="translate(100, 340)" class="anim-sol">
    <rect width="600" height="60" rx="8" fill="#cff4fc" stroke="#0dcaf0" stroke-width="2"/>
    
    <text x="30" y="38" class="code-text">
      scores = <tspan fill="#0dcaf0">new int[]</tspan> { 90, 80 };
    </text>
    <text x="460" y="36" class="label-text" fill="#087990">💡 완벽한 해결책!</text>
  </g>

</svg>
