<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <style>
    @keyframes move-one-by-one {
      0%, 10% { transform: translate(0, 0); opacity: 0; }
      20% { transform: translate(0, 70px); opacity: 1; }
      30%, 100% { transform: translate(0, 70px); opacity: 0; }
    }
    @keyframes move-one-by-one-2 {
      0%, 40% { transform: translate(0, 0); opacity: 0; }
      50% { transform: translate(0, 70px); opacity: 1; }
      60%, 100% { transform: translate(0, 70px); opacity: 0; }
    }
    @keyframes move-one-by-one-3 {
      0%, 70% { transform: translate(0, 0); opacity: 0; }
      80% { transform: translate(0, 70px); opacity: 1; }
      90%, 100% { transform: translate(0, 70px); opacity: 0; }
    }
    
    @keyframes move-block {
      0%, 20% { transform: translate(0, 0); opacity: 0; }
      50% { transform: translate(0, 70px); opacity: 1; }
      80%, 100% { transform: translate(0, 70px); opacity: 0; }
    }

    .box { fill: #fff; stroke: #0d6efd; stroke-width: 2; }
    .box-text { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
    
    .anim-1 { animation: move-one-by-one 4s infinite; }
    .anim-2 { animation: move-one-by-one-2 4s infinite; }
    .anim-3 { animation: move-one-by-one-3 4s infinite; }
    .anim-block { animation: move-block 4s infinite; }
  </style>

  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">배열 복사 방식 비교: for 문 vs System.arraycopy()</text>

  <!-- 왼쪽: for 문 복사 (하나씩) -->
  <g transform="translate(100, 100)">
    <rect width="250" height="280" rx="10" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <text x="125" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#dc3545" text-anchor="middle">for문 복사 (수작업 이사)</text>
    
    <!-- 원본 배열 -->
    <text x="50" y="80" font-family="sans-serif" font-size="12" fill="#6c757d">원본 배열 (크기 3)</text>
    <g transform="translate(50, 90)">
      <rect class="box" x="0" y="0" width="40" height="30"/>
      <text class="box-text" x="20" y="20" text-anchor="middle">A</text>
      
      <rect class="box" x="50" y="0" width="40" height="30"/>
      <text class="box-text" x="70" y="20" text-anchor="middle">B</text>
      
      <rect class="box" x="100" y="0" width="40" height="30"/>
      <text class="box-text" x="120" y="20" text-anchor="middle">C</text>
    </g>

    <!-- 화살표 애니메이션 -->
    <g transform="translate(60, 125)">
      <path class="anim-1" d="M 10 0 L 10 30" stroke="#dc3545" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path class="anim-2" d="M 60 0 L 60 30" stroke="#dc3545" stroke-width="3" marker-end="url(#arrow-red)"/>
      <path class="anim-3" d="M 110 0 L 110 30" stroke="#dc3545" stroke-width="3" marker-end="url(#arrow-red)"/>
    </g>

    <!-- 새 배열 -->
    <text x="50" y="200" font-family="sans-serif" font-size="12" fill="#6c757d">새 배열 (크기 5)</text>
    <g transform="translate(50, 210)">
      <rect class="box" x="0" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="50" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="100" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="150" y="0" width="40" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-dasharray="4"/>
    </g>
  </g>

  <!-- 오른쪽: System.arraycopy (통째로 블록 이사) -->
  <g transform="translate(450, 100)">
    <rect width="250" height="280" rx="10" fill="#e9ecef" stroke="#adb5bd" stroke-width="2"/>
    <text x="125" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#0d6efd" text-anchor="middle">System.arraycopy (지게차)</text>
    
    <!-- 원본 배열 -->
    <text x="50" y="80" font-family="sans-serif" font-size="12" fill="#6c757d">원본 배열 (크기 3)</text>
    <g transform="translate(50, 90)">
      <rect class="box" x="0" y="0" width="40" height="30"/>
      <text class="box-text" x="20" y="20" text-anchor="middle">A</text>
      
      <rect class="box" x="50" y="0" width="40" height="30"/>
      <text class="box-text" x="70" y="20" text-anchor="middle">B</text>
      
      <rect class="box" x="100" y="0" width="40" height="30"/>
      <text class="box-text" x="120" y="20" text-anchor="middle">C</text>
      
      <!-- 묶음 표시 -->
      <rect x="-5" y="-5" width="150" height="40" fill="none" stroke="#0d6efd" stroke-width="2" stroke-dasharray="8"/>
    </g>

    <!-- 묶음 통째로 이동 화살표 -->
    <g transform="translate(120, 125)">
      <path class="anim-block" d="M 0 0 L 0 40" stroke="#0d6efd" stroke-width="5" marker-end="url(#arrow-blue)"/>
      <rect class="anim-block" x="-50" y="10" width="100" height="20" fill="#0d6efd" opacity="0.3" rx="4"/>
    </g>

    <!-- 새 배열 -->
    <text x="50" y="200" font-family="sans-serif" font-size="12" fill="#6c757d">새 배열 (크기 5)</text>
    <g transform="translate(50, 210)">
      <rect class="box" x="0" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="50" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="100" y="0" width="40" height="30" stroke="#198754"/>
      <rect class="box" x="150" y="0" width="40" height="30" fill="#f8f9fa" stroke="#adb5bd" stroke-dasharray="4"/>
    </g>
  </g>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc3545"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d6efd"/>
    </marker>
  </defs>
</svg>
