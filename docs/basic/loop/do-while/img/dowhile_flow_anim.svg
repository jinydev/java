<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">do-while 문 실행 흐름 (선실행 후검사) 🥊</text>

    <!-- Global Loop Context -->
    <rect x="250" y="70" width="300" height="40" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="2" />
    <text x="400" y="96" font-family="monospace" font-size="18" fill="#15803d" font-weight="bold" text-anchor="middle">do { <tspan fill="#10b981">실행문</tspan> } while ( <tspan fill="#d97706">조건식</tspan> );</text>

    <!-- Cycle Diagram -->
    <g transform="translate(400, 190)">
        
        <!-- Entry Point -->
        <path d="M 0 -80 L 0 -30" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow-gray)" />
        <text x="0" y="-90" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#64748b" font-weight="bold" text-anchor="middle">진입 (무조건 통과!)</text>

        <!-- Execution Node (Top) -->
        <rect width="200" height="60" rx="5" fill="#dcfce7" stroke="#10b981" stroke-width="2" x="-100" y="-30" />
        <text x="0" y="0" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">코드 블록 `{}` 무조건 1회 실행</text>

        <!-- Path to Condition -->
        <path d="M 0 30 L 0 70" fill="none" stroke="#10b981" stroke-width="4" marker-end="url(#arrow-green)" />

        <!-- Condition Node (Bottom) -->
        <polygon points="0,70 80,110 0,150 -80,110" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
        <text x="0" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#a16207" font-weight="bold" text-anchor="middle">늦은 조건 검사</text>

        <!-- True Path (Loop back up) -->
        <path d="M -80 110 L -150 110 L -150 -10 L -100 -10" fill="none" stroke="#ca8a04" stroke-width="4" stroke-dasharray="5,5" marker-end="url(#arrow-yellow)" />
        <text x="-160" y="55" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" font-weight="bold" text-anchor="end">True (다시 실행)</text>

        <!-- False Path to Exit -->
        <path d="M 80 110 L 160 110 L 160 150" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow-red)" />
        <text x="120" y="100" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" font-weight="bold">False</text>

        <!-- Exit Node -->
        <rect x="120" y="150" width="80" height="40" rx="20" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
        <text x="160" y="175" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#b91c1c" font-weight="bold" text-anchor="middle">루프 탈출</text>

        <!-- Animation Dot (True Cycle) -->
        <circle cx="0" cy="0" r="8" fill="#3b82f6">
            <animate attributeName="opacity" values="1;1;1;1;0" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 -80 L 0 -30 L 0 30 L 0 70 L -80 110 L -150 110 L -150 -10 L -100 -10" />
        </circle>

        <!-- Animation Dot (False Escape) -->
        <circle cx="0" cy="0" r="8" fill="#ef4444">
            <animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.25;0.5;0.75;1" dur="4s" repeatCount="indefinite"/>
            <animateMotion dur="4s" repeatCount="indefinite" path="M 0 30 L 0 70 L 80 110 L 160 110 L 160 150" />
        </circle>
    </g>

    <text x="400" y="440" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">do-while 문은 '조건'을 맨 나중에 묻습니다. 무조건 최소 1번은 코드가 실행됩니다!</text>
    <text x="400" y="470" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#4f46e5" font-weight="bold" text-anchor="middle">사용자에게 최초 메뉴를 1번 보여주고 입력을 받아야 할 때 완벽한 도구입니다.</text>

    <!-- Arrow Definitions -->
    <defs>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ef4444" /></marker>
        <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ca8a04" /></marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#10b981" /></marker>
        <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#64748b" /></marker>
    </defs>
</svg>
