<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="400">
    <rect width="800" height="400" fill="#f8fafc" rx="15" />
    <rect width="796" height="396" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">CPU와 반복문: 끝없는 쳇바퀴 (Clock Cycle) ⚙️</text>

    <!-- Cycle Pipeline Area -->
    <g transform="translate(150, 80)">
        
        <!-- Center Gear (CPU Clock) -->
        <g transform="translate(250, 150)">
            <circle cx="0" cy="0" r="60" fill="#cbd5e1" stroke="#64748b" stroke-width="4" />
            <circle cx="0" cy="0" r="20" fill="#f1f5f9" stroke="#64748b" stroke-width="3" />
            
            <!-- Gear Teeth -->
            <g stroke="#64748b" stroke-width="8" stroke-linecap="round">
                <line x1="0" y1="-60" x2="0" y2="-75" />
                <line x1="0" y1="60" x2="0" y2="75" />
                <line x1="-60" y1="0" x2="-75" y2="0" />
                <line x1="60" y1="0" x2="75" y2="0" />
                <line x1="-42" y1="-42" x2="-53" y2="-53" />
                <line x1="42" y1="42" x2="53" y2="53" />
                <line x1="-42" y1="42" x2="-53" y2="53" />
                <line x1="42" y1="-42" x2="53" y2="-53" />
            </g>
            
            <!-- Spinning Animation -->
            <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite" />
        </g>
        
        <text x="250" y="155" font-family="monospace" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">CPU Clock</text>

        <!-- 4 Steps of a Loop -->
        
        <!-- 1. Init -->
        <g transform="translate(-50, -20)">
            <rect width="160" height="50" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="3" />
            <text x="80" y="30" font-family="monospace" font-size="16" fill="#1d4ed8" font-weight="bold" text-anchor="middle">1. 초기화 (i=0)</text>
        </g>
        
        <!-- Arrow 1 to 2 -->
        <path d="M 110 5 L 180 5" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />
        <path d="M 400 30 L 400 70" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 2. Condition -->
        <g transform="translate(180, -20)">
            <polygon points="75,0 150,25 75,50 0,25" fill="#fef08a" stroke="#ca8a04" stroke-width="3" />
            <text x="75" y="30" font-family="monospace" font-size="16" fill="#854d0e" font-weight="bold" text-anchor="middle">2. 조건 (i&lt;10)</text>
            
            <!-- Conditional text -->
            <text x="80" y="70" font-family="monospace" font-size="14" fill="#16a34a" font-weight="bold">True (돌아!)</text>
            <text x="160" y="30" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">False (멈춰!)</text>
            <path d="M 150 25 L 190 25" fill="none" stroke="#dc2626" stroke-width="3" stroke-dasharray="5,5" />
            <text x="200" y="30" font-family="monospace" font-size="14" fill="#dc2626" font-weight="bold">루프 탈출</text>
        </g>
        
        <!-- Arrow 2 to 3 -->
        <path d="M 255 30 L 255 90" fill="none" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 3. Execution -->
        <g transform="translate(175, 250)">
            <rect width="160" height="50" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="3" />
            <text x="80" y="30" font-family="monospace" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">3. 코드 실행</text>
        </g>
        
        <!-- Arrow 3 to 4 -->
        <path d="M 175 275 L 110 275" fill="none" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)" />

        <!-- 4. Increment/Update -->
        <g transform="translate(-50, 250)">
            <rect width="160" height="50" rx="10" fill="#f3e8ff" stroke="#a855f7" stroke-width="3" />
            <text x="80" y="30" font-family="monospace" font-size="16" fill="#7e22ce" font-weight="bold" text-anchor="middle">4. 증감 (i++)</text>
        </g>
        
        <!-- Arrow 4 back to 2 -->
        <path d="M 30 250 L 30 15 L 170 15" fill="none" stroke="#a855f7" stroke-width="4" stroke-dasharray="8,4" marker-end="url(#arrow)" />

        <!-- Define Arrowhead -->
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
            </marker>
        </defs>

        <!-- Tracing Animation Runner (Data Packet) -->
        <circle cx="0" cy="0" r="8" fill="#ef4444">
             <!-- Path: 1(Init) -> 2(Cond) -> 3(Exec) -> 4(Inc) -> back to 2(Cond) -->
             <animateMotion dur="4s" repeatCount="indefinite" path="M -50 5 L 180 5 L 255 5  L 255 275 L -50 275 L 30 275 L 30 15 L 180 15" />
        </circle>
        
    </g>
</svg>
