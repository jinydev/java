<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="500">
    <rect width="800" height="500" fill="#f8fafc" rx="15" />
    <rect width="796" height="496" x="2" y="2" fill="none" stroke="#e2e8f0" stroke-width="4" rx="15" />
    
    <text x="400" y="40" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">라벨(Label) break 실행 원리 (다중 방탈출!) 💣</text>

    <!-- Outer Loop (Building) -->
    <text x="100" y="100" font-family="monospace" font-size="20" fill="#c026d3" font-weight="bold">OuterLoop:</text>
    <rect x="80" y="110" width="640" height="280" rx="10" fill="#fdf4ff" stroke="#c026d3" stroke-width="4" stroke-dasharray="10,5" />
    <text x="80" y="130" font-family="monospace" font-size="30" fill="#c026d3" font-weight="bold" text-anchor="end">{</text>
    <text x="720" y="380" font-family="monospace" font-size="30" fill="#c026d3" font-weight="bold" text-anchor="start">}</text>
    <text x="100" y="135" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a21caf" font-weight="bold">바깥쪽 쳇바퀴 (for i)</text>

    <!-- Inner Loop (Small Room) -->
    <rect x="250" y="150" width="300" height="180" rx="10" fill="#fef08a" stroke="#ca8a04" stroke-width="3" stroke-dasharray="5,5" />
    <text x="250" y="165" font-family="monospace" font-size="20" fill="#ca8a04" font-weight="bold" text-anchor="end">{</text>
    <text x="550" y="320" font-family="monospace" font-size="20" fill="#ca8a04" font-weight="bold" text-anchor="start">}</text>
    <text x="270" y="175" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#a16207" font-weight="bold">안쪽 쳇바퀴 (for j)</text>

    <g transform="translate(400, 240)">
        
        <!-- Normal code execution path inside inner loop -->
        <circle cx="-60" cy="-20" r="6" fill="#64748b">
            <animate attributeName="opacity" values="1;1;0" dur="2s" repeatCount="indefinite" />
            <animateMotion dur="2s" repeatCount="indefinite" path="M -60 -20 A 40 40 0 1 1 -60 -21" />
        </circle>

        <!-- The "break OuterLoop;" Command -->
        <rect x="-80" y="20" width="160" height="40" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
        <text x="0" y="45" font-family="monospace" font-size="18" fill="#b91c1c" font-weight="bold" text-anchor="middle">break OuterLoop;!</text>

        <!-- Laser Beam Escaping Both Loops -->
        <path d="M 80 40 L 400 40" fill="none" stroke="#ef4444" stroke-width="8" stroke-dasharray="10,10">
             <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.5s" repeatCount="indefinite" />
        </path>
        
        <!-- Break effect on Inner Wall -->
        <path d="M 130 10 L 170 70" fill="none" stroke="#ca8a04" stroke-width="5" />
        <path d="M 170 10 L 130 70" fill="none" stroke="#ca8a04" stroke-width="5" />
        <circle cx="150" cy="40" r="20" fill="#fef08a" opacity="0.8">
            <animate attributeName="r" values="10;30;10" dur="1.5s" repeatCount="indefinite"/>
        </circle>

        <!-- Break effect on Outer Wall -->
        <path d="M 300 10 L 340 70" fill="none" stroke="#c026d3" stroke-width="5" />
        <path d="M 340 10 L 300 70" fill="none" stroke="#c026d3" stroke-width="5" />
        <circle cx="320" cy="40" r="30" fill="#fdf4ff" opacity="0.8">
            <animate attributeName="r" values="20;40;20" dur="1.5s" repeatCount="indefinite"/>
        </circle>

        <!-- Escape Path for Dot -->
        <circle cx="0" cy="0" r="8" fill="#ef4444">
            <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.1;0.4;0.9;1" dur="2.5s" repeatCount="indefinite"/>
            <animateMotion dur="2.5s" repeatCount="indefinite" path="M 0 40 L 400 40" />
        </circle>
        
        <!-- Outside Area Label -->
        <rect x="360" y="20" width="100" height="40" rx="20" fill="#dcfce7" stroke="#10b981" stroke-width="3" />
        <text x="410" y="45" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#15803d" font-weight="bold" text-anchor="middle">완전 탈출!</text>
    </g>

    <text x="400" y="440" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#475569" font-weight="bold" text-anchor="middle">일반 break; 는 자기를 감싼 안쪽 중괄호 1개만 부수고 나갑니다.</text>
    <text x="400" y="470" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" fill="#b91c1c" font-weight="bold" text-anchor="middle">하지만 break 이름표; 를 쓰면 그 이름이 붙은 바깥쪽 대문까지 한 방에 관통하여 탈출합니다!</text>
</svg>
