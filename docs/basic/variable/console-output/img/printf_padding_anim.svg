<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');
      
      .st-title { font-family: 'Noto Sans KR', sans-serif; font-size: 24px; font-weight: bold; fill: #2c3e50; }
      .st-desc { font-family: 'Noto Sans KR', sans-serif; font-size: 16px; fill: #555; }
      
      .code-text { font-family: 'Fira Code', monospace; font-size: 20px; font-weight: bold; fill: #1a5276; }
      .val-text { font-family: 'Fira Code', monospace; font-size: 24px; font-weight: bold; fill: #e74c3c; }
      
      .box { fill: #ecf0f1; stroke: #bdc3c7; stroke-width: 2; rx: 4; }
      .box-highlight { stroke: #3498db; stroke-width: 3; }
      
      /* Animation */
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5); }
        50% { transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
      }
      
      @keyframes slideRight {
        0% { opacity: 0; transform: translateX(-50px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      .val1 { opacity: 0; animation: popIn 0.5s ease forwards 1s; }
      .val2 { opacity: 0; animation: popIn 0.5s ease forwards 1.2s; }
      .val3 { opacity: 0; animation: popIn 0.5s ease forwards 1.4s; }
      .space-text { opacity: 0; animation: fadeIn 0.5s ease forwards 2s; fill: #95a5a6; font-family: 'Fira Code'; font-size: 20px;}
      .zero-text { opacity: 0; animation: popIn 0.5s ease forwards 2s; fill: #27ae60; font-family: 'Fira Code'; font-size: 24px; font-weight:bold;}
      
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="10" />
  
  <text x="400" y="50" text-anchor="middle" class="st-title">printf() 서식 지정자 자릿수 맞추기</text>
  <text x="400" y="80" text-anchor="middle" class="st-desc">총 5칸(자리)을 확보하고 숫자 '99'를 출력하는 3가지 방법</text>

  <!-- Row 1: %5d -->
  <g transform="translate(100, 130)">
    <rect x="0" y="0" width="120" height="40" fill="#ebf5fb" rx="4" />
    <text x="60" y="27" text-anchor="middle" class="code-text">%5d</text>
    <text x="140" y="27" class="st-desc" fill="#333">우측 정렬 (기본)</text>
    
    <!-- 5 cells -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="40" height="40" class="box" />
      <rect x="45" y="0" width="40" height="40" class="box" />
      <rect x="90" y="0" width="40" height="40" class="box" />
      <!-- Colored items -->
      <rect x="135" y="0" width="40" height="40" class="box box-highlight" />
      <rect x="180" y="0" width="40" height="40" class="box box-highlight" />
      
      <text x="20" y="27" text-anchor="middle" class="space-text">_</text>
      <text x="65" y="27" text-anchor="middle" class="space-text">_</text>
      <text x="110" y="27" text-anchor="middle" class="space-text">_</text>
      <text x="155" y="28" text-anchor="middle" class="val-text val1">9</text>
      <text x="200" y="28" text-anchor="middle" class="val-text val1">9</text>
    </g>
  </g>

  <!-- Row 2: %-5d -->
  <g transform="translate(100, 230)">
    <rect x="0" y="0" width="120" height="40" fill="#ebf5fb" rx="4" />
    <text x="60" y="27" text-anchor="middle" class="code-text">%-5d</text>
    <text x="140" y="27" class="st-desc" fill="#333">좌측 정렬 (마이너스 부호)</text>
    
    <!-- 5 cells -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="40" height="40" class="box box-highlight" />
      <rect x="45" y="0" width="40" height="40" class="box box-highlight" />
      <rect x="90" y="0" width="40" height="40" class="box" />
      <rect x="135" y="0" width="40" height="40" class="box" />
      <rect x="180" y="0" width="40" height="40" class="box" />
      
      <text x="20" y="28" text-anchor="middle" class="val-text val2">9</text>
      <text x="65" y="28" text-anchor="middle" class="val-text val2">9</text>
      <text x="110" y="27" text-anchor="middle" class="space-text">_</text>
      <text x="155" y="27" text-anchor="middle" class="space-text">_</text>
      <text x="200" y="27" text-anchor="middle" class="space-text">_</text>
    </g>
  </g>

  <!-- Row 3: %05d -->
  <g transform="translate(100, 330)">
    <rect x="0" y="0" width="120" height="40" fill="#ebf5fb" rx="4" />
    <text x="60" y="27" text-anchor="middle" class="code-text">%05d</text>
    <text x="140" y="27" class="st-desc" fill="#333">0으로 채우기 (우측 정렬)</text>
    
    <!-- 5 cells -->
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="40" height="40" class="box" />
      <rect x="45" y="0" width="40" height="40" class="box" />
      <rect x="90" y="0" width="40" height="40" class="box" />
      <rect x="135" y="0" width="40" height="40" class="box box-highlight" />
      <rect x="180" y="0" width="40" height="40" class="box box-highlight" />
      
      <text x="20" y="28" text-anchor="middle" class="zero-text">0</text>
      <text x="65" y="28" text-anchor="middle" class="zero-text">0</text>
      <text x="110" y="28" text-anchor="middle" class="zero-text">0</text>
      <text x="155" y="28" text-anchor="middle" class="val-text val3">9</text>
      <text x="200" y="28" text-anchor="middle" class="val-text val3">9</text>
    </g>
  </g>

  <rect x="0" y="0" width="800" height="450" fill="none" stroke="#e0e0e0" stroke-width="2" rx="10"/>
</svg>
